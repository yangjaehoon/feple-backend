name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create application-local.yaml
        env:
          APPLICATION_LOCAL_YAML: ${{ secrets.APPLICATION_LOCAL_YAML }}
        run: |
          mkdir -p src/main/resources
          printf '%s' "$APPLICATION_LOCAL_YAML" > src/main/resources/application-local.yaml

      - name: Build with Gradle
        run: ./gradlew bootJar -x test

      - name: Deploy to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/*.jar"
          target: "/tmp/"
          strip_components: 2

      - name: Restart Spring Boot service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl stop feple.service || true
            sudo mv /tmp/*.jar /opt/feple/feple.jar
            sudo systemctl start feple.service
            sleep 5
            systemctl is-active feple.service
