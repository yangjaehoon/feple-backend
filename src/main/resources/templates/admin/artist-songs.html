<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Feple Admin — 곡 관리</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<div th:insert="~{admin/fragments :: navbar('artists')}"></div>
<div class="main-content">
    <div class="page-header">
        <div>
            <h1 class="page-title">곡 관리</h1>
            <div class="breadcrumb">
                <a th:href="@{/admin}">대시보드</a>
                <span class="bc-sep">›</span>
                <a th:href="@{/admin/artists}">아티스트</a>
                <span class="bc-sep">›</span>
                <span th:text="${artist.name}"></span>
                <span class="bc-sep">›</span>
                <span>곡 관리</span>
            </div>
        </div>
        <div class="page-actions">
            <a class="btn btn-primary" th:href="@{/admin/artists/{id}/setlist(id=${artist.id})}">셋리스트 관리</a>
            <a class="btn btn-secondary" th:href="@{/admin/artists}">← 목록으로</a>
        </div>
    </div>

    <div class="content-area">
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <!-- 노래 요청 목록 -->
        <div class="card" style="margin-bottom:24px;">
            <div class="card-header">
                <div class="card-title">
                    노래 요청 목록
                    <span style="font-size:13px; font-weight:400; color:var(--muted); margin-left:6px;"
                          th:text="'— ' + ${pendingRequests.size()} + '건'"></span>
                </div>
            </div>

            <div th:if="${pendingRequests.isEmpty()}"
                 style="padding:32px; text-align:center; color:var(--muted); font-size:13px;">
                대기 중인 요청이 없습니다.
            </div>

            <div th:unless="${pendingRequests.isEmpty()}" style="padding:0 16px 16px;">
                <div th:each="request : ${pendingRequests}"
                     style="display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border);">
                    <div style="flex:1; min-width:0;">
                        <div style="font-size:13px; font-weight:600;" th:text="${request.songTitle}"></div>
                        <div style="font-size:12px; color:var(--muted); margin-top:2px;">
                            유저 ID: <span th:text="${request.userId}"></span>
                            (<span th:text="${request.userNickname}"></span>)
                            &nbsp;·&nbsp;
                            <span th:text="${request.createdAt}"></span>
                        </div>
                        <div th:if="${request.youtubeUrl != null and !request.youtubeUrl.isBlank()}"
                             style="font-size:12px; margin-top:2px;">
                            <a th:href="${request.youtubeUrl}" target="_blank"
                               style="color:var(--primary);" th:text="${request.youtubeUrl}"></a>
                        </div>
                    </div>
                    <form th:action="@{/admin/artists/{aId}/songs/song-requests/{rId}/approve(aId=${artist.id}, rId=${request.id})}"
                          method="post" style="display:flex; gap:6px; align-items:center; flex-shrink:0;">
                        <input type="text" name="youtubeUrl"
                               th:value="${request.youtubeUrl != null ? request.youtubeUrl : ''}"
                               placeholder="YouTube URL (선택)"
                               style="padding:4px 8px; border:1px solid var(--border); border-radius:6px; font-size:12px; width:200px;"/>
                        <button type="submit" class="btn btn-primary" style="font-size:12px; padding:4px 10px;">승인</button>
                    </form>
                    <form th:action="@{/admin/artists/{aId}/songs/song-requests/{rId}/reject(aId=${artist.id}, rId=${request.id})}"
                          method="post" style="display:flex; gap:6px; align-items:center; flex-shrink:0;">
                        <input type="text" name="reason"
                               placeholder="거절 사유 (선택)"
                               style="padding:4px 8px; border:1px solid var(--border); border-radius:6px; font-size:12px; width:160px;"/>
                        <button type="submit" class="btn btn-danger" style="font-size:12px; padding:4px 10px;"
                                onclick="return confirm('거절하시겠습니까?')">거절</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- YouTube URL 직접 입력 -->
        <div class="card" style="margin-bottom:24px;">
            <div class="card-header">
                <div class="card-title">YouTube URL 직접 입력</div>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/artists/{id}/songs(id=${artist.id})}" method="get"
                      style="display:flex; gap:8px; margin-bottom:6px;">
                    <input type="text" name="videoUrl" th:value="${videoUrl}"
                           placeholder="YouTube URL 또는 영상 ID (예: https://youtu.be/xxxxx 또는 dQw4w9WgXcQ)"
                           style="flex:1; padding:8px 12px; border:1px solid var(--border); border-radius:8px; font-size:13px;"/>
                    <button type="submit" class="btn btn-secondary">불러오기</button>
                </form>
                <div style="font-size:11px; color:var(--muted); margin-bottom:14px;">
                    YouTube에서 직접 영상을 찾아 URL을 붙여넣으세요. youtu.be 단축 URL, 전체 URL, 영상 ID 모두 지원합니다.
                </div>

                <div th:if="${previewVideo != null}"
                     style="display:flex; align-items:center; gap:12px; padding:12px; border:1px solid var(--primary); border-radius:8px; background:var(--surface);">
                    <img th:if="${previewVideo.thumbnailUrl != null}"
                         th:src="${previewVideo.thumbnailUrl}"
                         style="width:80px; height:60px; object-fit:cover; border-radius:4px; flex-shrink:0;"/>
                    <div style="flex:1; min-width:0;">
                        <div style="font-size:13px; font-weight:600;" th:text="${previewVideo.title}"></div>
                        <div style="font-size:12px; color:var(--muted); margin-top:2px;" th:text="${previewVideo.channelTitle}"></div>
                    </div>
                    <form th:action="@{/admin/artists/{id}/songs(id=${artist.id})}" method="post" style="flex-shrink:0;">
                        <input type="hidden" name="youtubeVideoId" th:value="${previewVideo.videoId}"/>
                        <input type="hidden" name="title" th:value="${previewVideo.title}"/>
                        <input type="hidden" name="thumbnailUrl" th:value="${previewVideo.thumbnailUrl}"/>
                        <button type="submit" class="btn btn-primary" style="font-size:12px; padding:5px 12px;">+ 추가</button>
                    </form>
                </div>

                <div th:if="${videoUrl != null and !videoUrl.isBlank() and previewVideo == null}"
                     style="color:var(--muted); font-size:13px; text-align:center; padding:12px 0;">
                    영상을 불러오지 못했습니다. URL을 확인해주세요.
                </div>
            </div>
        </div>

        <!-- 등록된 곡 목록 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    등록된 곡
                    <span style="font-size:13px; font-weight:400; color:var(--muted); margin-left:6px;"
                          th:text="'— ' + ${songs.size()} + '곡'"></span>
                </div>
            </div>

            <div th:if="${songs.isEmpty()}"
                 style="padding:32px; text-align:center; color:var(--muted); font-size:13px;">
                등록된 곡이 없습니다. 위에서 YouTube URL을 입력하여 추가해주세요.
            </div>

            <div th:unless="${songs.isEmpty()}" style="padding:0 16px 16px;">
                <div th:each="song, stat : ${songs}"
                     th:style="${stat.first} ? 'display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border);'
                                             : 'display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border);'">
                    <span style="font-size:12px; color:var(--muted); width:20px; text-align:center; flex-shrink:0;"
                          th:text="${stat.index + 1}"></span>
                    <img th:if="${song.thumbnailUrl != null}"
                         th:src="${song.thumbnailUrl}"
                         style="width:48px; height:36px; object-fit:cover; border-radius:4px; flex-shrink:0;"/>
                    <div style="flex:1; min-width:0;">
                        <div style="font-size:13px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"
                             th:text="${song.title}"></div>
                        <a th:href="${song.youtubeUrl}" target="_blank"
                           style="font-size:11px; color:var(--primary);">YouTube Music에서 보기</a>
                    </div>
                    <form th:action="@{/admin/artists/{aId}/songs/{sId}/delete(aId=${artist.id}, sId=${song.id})}"
                          method="post" style="flex-shrink:0;"
                          onsubmit="return confirm('삭제하시겠습니까?')">
                        <button type="submit" class="btn btn-danger" style="font-size:12px; padding:4px 10px;">삭제</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
