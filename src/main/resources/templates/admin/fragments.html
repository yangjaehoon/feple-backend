<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<body>

<!-- ── 통합 가로 네비게이션 바 ── -->
<header th:fragment="navbar(active)" class="navbar-global">

    <!-- 브랜드 로고 -->
    <a class="nb-brand" th:href="@{/admin}">
        <img th:src="@{/img/feple_logo.png}" alt="feple" style="width:34px; height:34px; border-radius:8px; object-fit:contain;"/>
        <div class="nb-name">fe<span>ple</span></div>
        <span class="nb-tag">Admin</span>
    </a>

    <div class="nb-divider"></div>

    <!-- 네비게이션 링크 (데스크톱) -->
    <nav class="nb-nav">
        <a th:href="@{/admin}" class="nb-link"
           th:classappend="${active == 'home'} ? ' nb-active'">
            📊 대시보드
        </a>
        <a sec:authorize="hasAuthority('PERM_STATS')"
           th:href="@{/admin/stats}" class="nb-link"
           th:classappend="${active == 'stats'} ? ' nb-active'">
            📈 통계
        </a>
        <a sec:authorize="hasAuthority('PERM_FESTIVALS')"
           th:href="@{/admin/festivals}" class="nb-link"
           th:classappend="${active == 'festivals'} ? ' nb-active'">
            🎵 페스티벌
        </a>
        <a sec:authorize="hasAuthority('PERM_ARTISTS')"
           th:href="@{/admin/artists}" class="nb-link"
           th:classappend="${active == 'artists'} ? ' nb-active'">
            🎤 아티스트
        </a>
        <a sec:authorize="hasAuthority('PERM_POSTS')"
           th:href="@{/admin/posts}" class="nb-link"
           th:classappend="${active == 'posts'} ? ' nb-active'">
            📝 게시글
        </a>
        <a sec:authorize="hasAuthority('PERM_USERS')"
           th:href="@{/admin/users}" class="nb-link"
           th:classappend="${active == 'users'} ? ' nb-active'">
            👤 회원 관리
        </a>
        <a sec:authorize="hasAuthority('PERM_CERTIFICATIONS')"
           th:href="@{/admin/certifications}" class="nb-link"
           th:classappend="${active == 'certifications'} ? ' nb-active'">
            🏅 인증 관리
        </a>
        <a sec:authorize="hasAuthority('PERM_REPORTS')"
           th:href="@{/admin/reports}" class="nb-link"
           th:classappend="${active == 'reports'} ? ' nb-active'">
            🚨 신고 관리
        </a>
        <a sec:authorize="hasAuthority('PERM_BAD_WORDS')"
           th:href="@{/admin/bad-words}" class="nb-link"
           th:classappend="${active == 'bad-words'} ? ' nb-active'">
            🚫 금칙어
        </a>
        <a sec:authorize="hasAuthority('PERM_CRAWL')"
           th:href="@{/admin/crawl}" class="nb-link"
           th:classappend="${active == 'crawl'} ? ' nb-active'">
            🕸️ 크롤링
        </a>
        <a sec:authorize="hasAuthority('PERM_LOGS')"
           th:href="@{/admin/logs}" class="nb-link"
           th:classappend="${active == 'logs'} ? ' nb-active'">
            📋 감사 로그
        </a>
        <a sec:authorize="hasRole('SUPER_ADMIN')"
           th:href="@{/admin/accounts}" class="nb-link"
           th:classappend="${active == 'accounts'} ? ' nb-active'">
            관리자 계정
        </a>
    </nav>

    <div style="flex:1;"></div>

    <!-- 우측 액션 (데스크톱) -->
    <div class="nb-actions">
        <div class="nb-avatar" title="관리자">👩‍💼</div>
        <form th:action="@{/admin/logout}" method="post" style="margin:0;">
            <button type="submit" class="nb-logout">로그아웃</button>
        </form>
    </div>

    <!-- 햄버거 버튼 (모바일) -->
    <button id="nb-toggle" class="nb-toggle" aria-label="메뉴 열기" aria-expanded="false">
        <span class="nb-hb-line"></span>
        <span class="nb-hb-line"></span>
        <span class="nb-hb-line"></span>
    </button>

    <!-- 모바일 드롭다운 메뉴 -->
    <div id="nb-mobile-menu" class="nb-mobile-menu" aria-hidden="true">
        <a th:href="@{/admin}" class="nb-mobile-link"
           th:classappend="${active == 'home'} ? ' nb-active'">📊 대시보드</a>
        <a sec:authorize="hasAuthority('PERM_STATS')"
           th:href="@{/admin/stats}" class="nb-mobile-link"
           th:classappend="${active == 'stats'} ? ' nb-active'">📈 통계</a>
        <a sec:authorize="hasAuthority('PERM_FESTIVALS')"
           th:href="@{/admin/festivals}" class="nb-mobile-link"
           th:classappend="${active == 'festivals'} ? ' nb-active'">🎵 페스티벌</a>
        <a sec:authorize="hasAuthority('PERM_ARTISTS')"
           th:href="@{/admin/artists}" class="nb-mobile-link"
           th:classappend="${active == 'artists'} ? ' nb-active'">🎤 아티스트</a>
        <a sec:authorize="hasAuthority('PERM_POSTS')"
           th:href="@{/admin/posts}" class="nb-mobile-link"
           th:classappend="${active == 'posts'} ? ' nb-active'">📝 게시글</a>
        <a sec:authorize="hasAuthority('PERM_USERS')"
           th:href="@{/admin/users}" class="nb-mobile-link"
           th:classappend="${active == 'users'} ? ' nb-active'">👤 회원 관리</a>
        <a sec:authorize="hasAuthority('PERM_CERTIFICATIONS')"
           th:href="@{/admin/certifications}" class="nb-mobile-link"
           th:classappend="${active == 'certifications'} ? ' nb-active'">🏅 인증 관리</a>
        <a sec:authorize="hasAuthority('PERM_REPORTS')"
           th:href="@{/admin/reports}" class="nb-mobile-link"
           th:classappend="${active == 'reports'} ? ' nb-active'">🚨 신고 관리</a>
        <a sec:authorize="hasAuthority('PERM_BAD_WORDS')"
           th:href="@{/admin/bad-words}" class="nb-mobile-link"
           th:classappend="${active == 'bad-words'} ? ' nb-active'">🚫 금칙어</a>
        <a sec:authorize="hasAuthority('PERM_CRAWL')"
           th:href="@{/admin/crawl}" class="nb-mobile-link"
           th:classappend="${active == 'crawl'} ? ' nb-active'">🕸️ 크롤링</a>
        <a sec:authorize="hasAuthority('PERM_LOGS')"
           th:href="@{/admin/logs}" class="nb-mobile-link"
           th:classappend="${active == 'logs'} ? ' nb-active'">📋 감사 로그</a>
        <a sec:authorize="hasRole('SUPER_ADMIN')"
           th:href="@{/admin/accounts}" class="nb-mobile-link"
           th:classappend="${active == 'accounts'} ? ' nb-active'">관리자 계정</a>
        <div class="nb-mobile-footer">
            <form th:action="@{/admin/logout}" method="post" style="margin:0;">
                <button type="submit" class="nb-logout" style="width:100%;">로그아웃</button>
            </form>
        </div>
    </div>

    <script th:src="@{/js/admin-genre-colors.js}"></script>
    <script>
    (function () {
        var toggle = document.getElementById('nb-toggle');
        var menu   = document.getElementById('nb-mobile-menu');

        toggle.addEventListener('click', function () {
            var open = menu.classList.toggle('open');
            toggle.classList.toggle('open', open);
            toggle.setAttribute('aria-expanded', String(open));
            menu.setAttribute('aria-hidden', String(!open));
        });

        document.addEventListener('click', function (e) {
            if (!toggle.contains(e.target) && !menu.contains(e.target)) {
                menu.classList.remove('open');
                toggle.classList.remove('open');
                toggle.setAttribute('aria-expanded', 'false');
                menu.setAttribute('aria-hidden', 'true');
            }
        });

        window.addEventListener('resize', function () {
            if (window.innerWidth > 900) {
                menu.classList.remove('open');
                toggle.classList.remove('open');
            }
        });
    })();
    </script>
</header>

<!-- ── 페이지네이션 프래그먼트 ── -->
<!-- baseUrl: 기본 URL (예: /admin/certifications)
     extraParams: 추가 쿼리파라미터 문자열 (예: 'status=PENDING', null이면 생략) -->
<div th:fragment="pagination(page, baseUrl, extraParams)" class="table-footer">
    <span class="page-info" th:text="'총 ' + ${page.totalElements} + '건'"></span>
    <div class="pagination" style="margin-left:auto;">
        <a th:if="${page.hasPrevious()}"
           th:href="${baseUrl + '?page=' + (page.number - 1) + (extraParams != null ? '&' + extraParams : '')}">← 이전</a>
        <span th:text="${page.number + 1} + ' / ' + ${page.totalPages}"></span>
        <a th:if="${page.hasNext()}"
           th:href="${baseUrl + '?page=' + (page.number + 1) + (extraParams != null ? '&' + extraParams : '')}">다음 →</a>
    </div>
</div>

</body>
</html>
