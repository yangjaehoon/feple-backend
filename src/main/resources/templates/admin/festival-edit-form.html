<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Feple Admin — 페스티벌 수정</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<div class="layout">

    <div th:insert="~{admin/fragments :: sidebar('festivals')}"></div>

    <div class="main-area">
        <header class="topbar">
            <div class="topbar-left">
                <div class="topbar-title">페스티벌 수정</div>
                <div class="breadcrumb">
                    <a th:href="@{/admin}">대시보드</a>
                    <span class="bc-sep">›</span>
                    <a th:href="@{/admin/festivals}">페스티벌</a>
                    <span class="bc-sep">›</span>
                    <span>수정</span>
                </div>
            </div>
        </header>

        <main class="content">
            <div class="card" style="max-width:640px;">
                <div class="card-header">
                    <div class="card-title">✏ 페스티벌 수정</div>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/festivals/{id}/edit(id=${festivalId})}"
                          th:object="${festival}"
                          method="post"
                          enctype="multipart/form-data">

                        <div class="form-grid">
                            <div class="form-group">
                                <label>제목</label>
                                <input type="text" th:field="*{title}" required/>
                            </div>

                            <div class="form-group">
                                <label>설명</label>
                                <textarea th:field="*{description}"></textarea>
                            </div>

                            <div class="form-group">
                                <label>장소</label>
                                <input type="text" th:field="*{location}" required/>
                            </div>

                            <div class="form-row-2">
                                <div class="form-group">
                                    <label>시작일</label>
                                    <input type="date" th:field="*{startDate}" required/>
                                </div>
                                <div class="form-group">
                                    <label>종료일</label>
                                    <input type="date" th:field="*{endDate}" required/>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>현재 포스터</label>
                                <div th:if="*{posterUrl}">
                                    <img th:src="${festival.posterUrl}" alt="poster" class="poster-preview"/>
                                    <p style="margin-top:6px;">
                                        <a th:href="${festival.posterUrl}" target="_blank"
                                           style="font-size:12px; color:var(--primary-600);">원본 보기 →</a>
                                    </p>
                                </div>
                                <p th:if="!*{posterUrl}" class="hint">등록된 포스터가 없습니다.</p>
                            </div>

                            <div class="form-group">
                                <label>포스터 변경</label>
                                <input type="file" name="posterFile" accept="image/*"/>
                                <span class="hint">선택하지 않으면 기존 포스터가 유지됩니다.</span>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">수정 저장</button>
                            <a th:href="@{/admin/festivals}" class="btn btn-secondary">목록으로</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>
</body>
</html>
