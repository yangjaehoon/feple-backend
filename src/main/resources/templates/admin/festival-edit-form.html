<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Feple Admin — 페스티벌 수정</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<div th:insert="~{admin/fragments :: navbar('festivals')}"></div>
<div class="main-content">
    <div class="page-header">
        <div>
            <h1 class="page-title">페스티벌 수정</h1>
            <div class="breadcrumb">
                <a th:href="@{/admin}">대시보드</a>
                <span class="bc-sep">›</span>
                <a th:href="@{/admin/festivals}">페스티벌</a>
                <span class="bc-sep">›</span>
                <span>수정</span>
            </div>
        </div>
    </div>
    <div class="content-area">
        <div class="card" style="max-width:640px;">
            <div class="card-header">
                <div class="card-title">✏ 페스티벌 수정</div>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/festivals/{id}/edit(id=${festivalId})}"
                      th:object="${festival}"
                      method="post"
                      enctype="multipart/form-data">

                    <div class="form-grid">
                        <div class="form-group">
                            <label>제목</label>
                            <input type="text" th:field="*{title}" required/>
                        </div>

                        <div class="form-group">
                            <label>설명</label>
                            <textarea th:field="*{description}"></textarea>
                        </div>

                        <div class="form-group">
                            <label>장소</label>
                            <input type="text" th:field="*{location}" required/>
                        </div>

                        <div class="form-row-2">
                            <div class="form-group">
                                <label>시작일</label>
                                <input type="date" th:field="*{startDate}" required/>
                            </div>
                            <div class="form-group">
                                <label>종료일</label>
                                <input type="date" th:field="*{endDate}" required/>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>현재 포스터</label>
                            <div th:if="${currentPosterUrl}">
                                <img th:src="${currentPosterUrl}" alt="poster" class="poster-preview"/>
                                <p style="margin-top:6px;">
                                    <a th:href="${currentPosterUrl}" target="_blank"
                                       style="font-size:12px; color:var(--primary-600);">원본 보기 →</a>
                                </p>
                            </div>
                            <p th:unless="${currentPosterUrl}" class="hint">등록된 포스터가 없습니다.</p>
                        </div>

                        <div class="form-group">
                            <label>포스터 변경</label>
                            <input type="file" name="posterFile" accept="image/*"/>
                            <span class="hint">선택하지 않으면 기존 포스터가 유지됩니다.</span>
                        </div>

                        <div class="form-group">
                            <label>지역</label>
                            <select th:field="*{region}" style="width:100%; padding:8px 12px; border:1px solid var(--border); border-radius:8px; font-size:13px;">
                                <option value="">선택 안 함</option>
                                <option th:each="r : ${allRegions}" th:value="${r}" th:text="${r.displayName}"></option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>장르 <span style="font-weight:400; color:var(--muted); font-size:12px;">(복수 선택 가능)</span></label>
                            <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:4px;">
                                <label th:each="g : ${allGenres}"
                                       style="display:flex; align-items:center; gap:6px; padding:6px 12px; border:1px solid var(--border); border-radius:20px; cursor:pointer; font-size:13px;">
                                    <input type="checkbox" name="genres" th:value="${g}"
                                           th:checked="${festival.genres != null and festival.genres.contains(g)}"
                                           style="accent-color:var(--primary);"/>
                                    <span th:text="${g.displayName}"></span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">수정 저장</button>
                        <a th:href="@{/admin/festivals}" class="btn btn-secondary">목록으로</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
