<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments :: head('아티스트 신청')}"></head>
<body>
<div th:insert="~{admin/fragments :: navbar('artist-suggestions')}"></div>
<div class="main-content">

    <div th:replace="~{admin/fragments :: pageHeader('아티스트 신청', '아티스트 신청')}"></div>

    <div class="content-area">
        <div th:insert="~{admin/fragments :: alerts}"></div>

        <div class="card">
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th class="col-w48">#</th>
                        <th>아티스트 이름</th>
                        <th>추가 정보</th>
                        <th class="col-w110">신청자</th>
                        <th class="col-w130">신청일</th>
                        <th class="col-w90">처리</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="s : ${suggestions.content}">
                        <td class="td-id" th:text="${s.id}"></td>
                        <td class="cell-primary" th:text="${s.artistName}"></td>
                        <td class="cell-secondary" th:text="${s.note != null ? s.note : '—'}"></td>
                        <td class="td-sub" th:text="${s.userNickname}"></td>
                        <td class="cell-secondary"
                            th:text="${#temporals.format(s.createdAt, 'yy-MM-dd HH:mm')}"></td>
                        <td>
                            <button type="button" class="btn btn-primary btn-sm open-dismiss-btn"
                                    th:data-id="${s.id}"
                                    th:data-artist="${s.artistName}">처리하기</button>
                        </td>
                    </tr>
                    <tr th:if="${suggestions.totalElements == 0}" th:replace="~{admin/fragments :: emptyRow(6, '대기 중인 아티스트 신청이 없습니다.')}"></tr>
                    </tbody>
                </table>
            </div>

            <div th:insert="~{admin/fragments :: pagination(${suggestions}, '/admin/artist-suggestions', null)}"></div>
        </div>
    </div>
</div>

<div id="dismiss-modal" class="modal-overlay">
    <div class="admin-modal-box">
        <div class="admin-modal-header">
            <div class="admin-modal-title">신청 처리</div>
            <div id="dismiss-artist-name" class="admin-modal-subtitle"></div>
        </div>
        <div class="admin-modal-section">
            <div class="admin-modal-label">처리 사유 (선택)</div>
            <div class="reason-chip-row">
                <button type="button" class="reason-chip" data-reason="요청하신 아티스트를 등록했어요!">등록 완료</button>
                <button type="button" class="reason-chip" data-reason="이미 등록된 아티스트예요.">이미 등록됨</button>
                <button type="button" class="reason-chip" data-reason="정보가 부족해서 등록이 어려워요.">정보 부족</button>
                <button type="button" class="reason-chip" data-reason="활동 이력이 없어서 등록이 어려워요.">비활동 아티스트</button>
                <button type="button" class="reason-chip" data-reason="">직접 입력</button>
            </div>
            <textarea id="dismiss-note" rows="3" class="admin-modal-textarea"
                      placeholder="사용자에게 전달할 메시지를 입력하세요. (미입력 시 기본 메시지로 발송됩니다)"></textarea>
        </div>
        <form id="dismiss-form" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="processNote" id="dismiss-process-note"/>
            <div class="admin-modal-actions">
                <button type="button" id="dismiss-close-btn" class="btn btn-secondary">취소</button>
                <button type="submit" class="btn btn-primary">처리 완료</button>
            </div>
        </form>
    </div>
</div>

<script th:inline="javascript">
/*<![CDATA[*/
window.ArtistSuggestionUrls = { dismissBase: /*[[@{/admin/artist-suggestions}]]*/ '' };
/*]]>*/
</script>
<script th:src="@{/js/admin-dismiss-modal.js}"></script>
</body>
</html>
