<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'Feple Admin — ' + ${festival.title}">페스티벌 상세</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
    <style>
        .stage-tag {
            display: inline-flex; align-items: center; gap: 6px;
            background: #f0f4ff; border: 1px solid #c7d5ff;
            border-radius: 20px; padding: 4px 12px 4px 14px;
            font-size: 13px; font-weight: 600; color: #3b5bdb;
            margin: 4px 4px 4px 0;
        }
        .stage-tag form { margin: 0; }
        .stage-tag button {
            background: none; border: none; padding: 0; line-height: 1;
            color: #aaa; font-size: 14px; cursor: pointer;
        }
        .stage-tag button:hover { color: #e53e3e; }
        .stage-add-inline {
            display: flex; align-items: center; gap: 8px; margin-top: 10px;
        }
        .stage-add-inline input {
            padding: 6px 12px; border: 1px solid var(--border);
            border-radius: 8px; font-size: 13px; width: 180px;
        }
        .stage-add-inline button {
            padding: 6px 16px; background: #3b5bdb; color: #fff;
            border: none; border-radius: 8px; font-size: 13px;
            font-weight: 600; cursor: pointer; white-space: nowrap;
        }
        .stage-add-inline button:hover { background: #2f4ac4; }
        .stage-empty { font-size: 13px; color: var(--muted); margin: 4px 0 8px; }
        select.stage-select {
            padding: 5px 8px; border: 1px solid var(--border);
            border-radius: 6px; font-size: 13px; min-width: 120px;
        }
    </style>
</head>
<body>
<div th:insert="~{admin/fragments :: navbar('festivals')}"></div>
<div class="main-content">
    <div class="page-header">
        <div>
            <h1 class="page-title" th:text="${festival.title}">페스티벌</h1>
            <div class="breadcrumb">
                <a th:href="@{/admin}">대시보드</a>
                <span class="bc-sep">›</span>
                <a th:href="@{/admin/festivals}">페스티벌</a>
                <span class="bc-sep">›</span>
                <span th:text="${festival.title}"></span>
            </div>
        </div>
    </div>
    <div class="content-area">

        <!-- Flash messages -->
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}"
             style="padding:12px 16px; border-radius:6px; font-size:13.5px; font-weight:500; margin-bottom:20px; background:#FFF5F5; color:#9B2C2C; border:1px solid #FC8181;"
             th:text="${errorMessage}"></div>

        <!-- 기본 정보 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">🎵 페스티벌 정보</div>
            </div>
            <div class="card-body">
                <div class="festival-info">
                    <img class="poster-img"
                         th:if="${festival.posterUrl != null and !#strings.isEmpty(festival.posterUrl)}"
                         th:src="${festival.posterUrl}" th:alt="${festival.title}"/>
                    <div class="no-poster"
                         th:if="${festival.posterUrl == null or #strings.isEmpty(festival.posterUrl)}">
                        <span style="font-size:28px;">🖼️</span>
                        <span>포스터 없음</span>
                    </div>
                    <div class="meta-list">
                        <div class="meta-item">
                            <div class="meta-label">기간</div>
                            <div class="meta-value" th:text="${festival.startDate} + ' ~ ' + ${festival.endDate}"></div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">장소</div>
                            <div class="meta-value" th:text="${festival.location}"></div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">좋아요</div>
                            <div class="meta-value" style="color:var(--primary);">
                                ❤ <span th:text="${festival.likeCount}">0</span>
                            </div>
                        </div>
                        <div class="meta-item" th:if="${festival.description != null}">
                            <div class="meta-label">설명</div>
                            <div class="meta-value" th:text="${festival.description}"></div>
                        </div>
                    </div>
                </div>
                <div class="detail-actions">
                    <a th:href="@{/admin/festivals/{id}/edit(id=${festival.id})}" class="btn btn-warning">✏ 수정</a>
                    <a th:href="@{/admin/festivals/{id}/artists/new(id=${festival.id})}" class="btn btn-primary">+ 아티스트 추가</a>
                    <a th:href="@{/admin/festivals}" class="btn btn-secondary">목록</a>
                    <form th:action="@{/admin/festivals/{id}/delete(id=${festival.id})}"
                          method="post" onsubmit="return confirm('이 페스티벌을 삭제할까요?');">
                        <button type="submit" class="btn btn-danger">삭제</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- 참여 아티스트 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    참여 아티스트
                    <span class="card-count" th:text="${participatingArtists.size() ?: 0}"></span>
                </div>
                <a class="btn btn-primary btn-sm"
                   th:href="@{/admin/festivals/{id}/artists/new(id=${festival.id})}">+ 추가</a>
            </div>

            <!-- 행별 편집 폼 (테이블 바깥, HTML5 form 속성으로 연결) -->
            <div th:each="af : ${participatingArtists}" style="display:none;">
                <form th:id="|edit-form-${af.artistFestivalId}|"
                      th:action="@{/admin/festivals/{fId}/artists/{afId}/edit(fId=${festival.id}, afId=${af.artistFestivalId})}"
                      method="post"></form>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>순서</th>
                        <th>아티스트</th>
                        <th>장르</th>
                        <th>스테이지</th>
                        <th>저장</th>
                        <th>삭제</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="af : ${participatingArtists}">
                        <td>
                            <input type="number" name="lineupOrder"
                                   th:value="${af.lineupOrder}"
                                   th:attr="form=|edit-form-${af.artistFestivalId}|"
                                   style="width:55px; padding:5px 6px; border:1px solid var(--border); border-radius:6px; font-size:13px; text-align:center;"/>
                        </td>
                        <td style="font-weight:600;" th:text="${af.artistName}"></td>
                        <td><span class="badge badge-genre" th:text="${af.artistGenre}"></span></td>
                        <td>
                            <th:block th:if="${!stages.isEmpty()}">
                                <select name="stageName" class="stage-select"
                                        th:attr="form=|edit-form-${af.artistFestivalId}|">
                                    <option value="">— 미지정 —</option>
                                    <option th:each="s : ${stages}"
                                            th:value="${s.name}"
                                            th:text="${s.name}"
                                            th:selected="${s.name == af.stageName}"></option>
                                </select>
                            </th:block>
                            <th:block th:if="${stages.isEmpty()}">
                                <span style="font-size:12px; color:var(--muted);">스테이지 없음</span>
                                <input type="hidden" name="stageName"
                                       th:value="${af.stageName}"
                                       th:attr="form=|edit-form-${af.artistFestivalId}|"/>
                            </th:block>
                        </td>
                        <td>
                            <button type="submit"
                                    th:attr="form=|edit-form-${af.artistFestivalId}|"
                                    class="btn btn-warning btn-sm">저장</button>
                        </td>
                        <td>
                            <form th:action="@{/admin/festivals/{fId}/artists/{afId}/delete(fId=${festival.id}, afId=${af.artistFestivalId})}"
                                  method="post">
                                <button type="submit" class="btn btn-danger btn-sm"
                                        onclick="return confirm('삭제하시겠습니까?')">삭제</button>
                            </form>
                        </td>
                    </tr>
                    <tr class="empty-row" th:if="${participatingArtists.isEmpty() ?: true}">
                        <td colspan="6">참여 아티스트가 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 타임테이블 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    🕐 타임테이블
                    <span class="card-count" th:text="${timetableEntries.size() ?: 0}"></span>
                </div>
            </div>
            <div class="card-body">

                <!-- ── 스테이지 관리 영역 ── -->
                <div style="background:#f8f9ff; border:1px solid #dde3ff; border-radius:10px; padding:14px 18px; margin-bottom:20px;">
                    <div style="font-size:13px; font-weight:700; color:#3b5bdb; margin-bottom:6px;">📋 스테이지 목록</div>
                    <div th:if="${stages.isEmpty()}" class="stage-empty">등록된 스테이지가 없습니다. 아래에서 추가해주세요.</div>
                    <div th:if="${!stages.isEmpty()}">
                        <span th:each="s : ${stages}" class="stage-tag">
                            <span th:text="${s.name}"></span>
                            <form th:action="@{/admin/festivals/{id}/stages/{sid}/delete(id=${festival.id}, sid=${s.id})}"
                                  method="post"
                                  onsubmit="return confirm('스테이지를 삭제할까요?')">
                                <button type="submit" title="삭제">✕</button>
                            </form>
                        </span>
                    </div>
                    <form th:action="@{/admin/festivals/{id}/stages(id=${festival.id})}"
                          method="post" class="stage-add-inline">
                        <input type="text" name="name" placeholder="스테이지명 (예: Main, Sub1)" maxlength="30"/>
                        <button type="submit">+ 스테이지 추가</button>
                    </form>
                </div>

                <!-- 타임테이블 추가 폼 -->
                <form th:action="@{/admin/festivals/{id}/timetable(id=${festival.id})}"
                      method="post"
                      style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr auto; gap:8px; align-items:end; margin-bottom:20px;">

                    <input type="hidden" name="stageName" id="autoStageName"/>

                    <div>
                        <label style="font-size:11px; font-weight:600; color:var(--muted); display:block; margin-bottom:4px;">날짜</label>
                        <input type="date" name="festivalDate"
                               th:min="${festival.startDate}" th:max="${festival.endDate}"
                               th:value="${festival.startDate}" required
                               style="width:100%; padding:7px 10px; border:1px solid var(--border); border-radius:8px; font-size:13px;"/>
                    </div>
                    <div>
                        <label style="font-size:11px; font-weight:600; color:var(--muted); display:block; margin-bottom:4px;">아티스트</label>
                        <th:block th:if="${!participatingArtists.isEmpty()}">
                            <select name="artistName" id="artistSelect" required onchange="onArtistChange(this)"
                                    style="width:100%; padding:7px 10px; border:1px solid var(--border); border-radius:8px; font-size:13px;">
                                <option value="" disabled selected>아티스트 선택</option>
                                <option th:each="af : ${participatingArtists}"
                                        th:value="${af.artistName}"
                                        th:text="${af.artistName}"
                                        th:attr="data-stage=${af.stageName}"></option>
                            </select>
                        </th:block>
                        <th:block th:if="${participatingArtists.isEmpty()}">
                            <input type="text" disabled placeholder="참여 아티스트를 먼저 추가하세요"
                                   style="width:100%; padding:7px 10px; border:1px solid var(--border); border-radius:8px; font-size:13px; background:#f5f5f5;"/>
                        </th:block>
                    </div>
                    <div>
                        <label style="font-size:11px; font-weight:600; color:var(--muted); display:block; margin-bottom:4px;">스테이지 (자동)</label>
                        <div id="stagePreview" style="padding:7px 10px; border:1px solid var(--border); border-radius:8px; font-size:13px; background:#f8f9ff; color:var(--muted); min-height:36px;">
                            아티스트 선택 시 자동 입력
                        </div>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                        <div>
                            <label style="font-size:11px; font-weight:600; color:var(--muted); display:block; margin-bottom:4px;">시작</label>
                            <input type="time" name="startTime" required
                                   style="width:100%; padding:7px 10px; border:1px solid var(--border); border-radius:8px; font-size:13px;"/>
                        </div>
                        <div>
                            <label style="font-size:11px; font-weight:600; color:var(--muted); display:block; margin-bottom:4px;">종료</label>
                            <input type="time" name="endTime" required
                                   style="width:100%; padding:7px 10px; border:1px solid var(--border); border-radius:8px; font-size:13px;"/>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" style="white-space:nowrap;">+ 추가</button>
                </form>

                <!-- 목록 테이블 -->
                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>스테이지</th>
                            <th>아티스트</th>
                            <th>시간</th>
                            <th>삭제</th>
                        </tr>
                        </thead>
                        <tbody>
                        <th:block th:each="entry, stat : ${timetableEntries}">
                            <!-- 날짜 구분 헤더: 첫 항목이거나 날짜가 바뀔 때 -->
                            <tr th:if="${stat.first or entry.festivalDate != timetableEntries[stat.index - 1].festivalDate}"
                                style="background:#eef2ff; border-top:2px solid #c5d0fa;">
                                <td colspan="4"
                                    style="padding:8px 14px; font-size:13px; font-weight:700; color:#3b5bdb; letter-spacing:0.3px;">
                                    📅 <span th:text="${entry.festivalDate}"></span>
                                </td>
                            </tr>
                            <!-- 항목 행 -->
                            <tr>
                                <td><span class="badge badge-genre" th:text="${entry.stageName}"></span></td>
                                <td style="font-weight:600;" th:text="${entry.artistName}"></td>
                                <td style="font-size:13px; white-space:nowrap;">
                                    <span style="font-weight:700; color:#2d3748;" th:text="${entry.startTime}"></span>
                                    <span style="color:var(--muted); margin:0 4px;">~</span>
                                    <span style="font-weight:700; color:#2d3748;" th:text="${entry.endTime}"></span>
                                </td>
                                <td>
                                    <form th:action="@{/admin/festivals/{fId}/timetable/{eId}/delete(fId=${festival.id},eId=${entry.id})}"
                                          method="post">
                                        <button type="submit" class="btn btn-danger btn-sm"
                                                onclick="return confirm('삭제하시겠습니까?')">삭제</button>
                                    </form>
                                </td>
                            </tr>
                        </th:block>
                        <tr class="empty-row" th:if="${timetableEntries.isEmpty()}">
                            <td colspan="4">등록된 타임테이블이 없습니다.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function onArtistChange(select) {
    const opt = select.options[select.selectedIndex];
    const stage = opt.getAttribute('data-stage') || '';
    document.getElementById('autoStageName').value = stage;
    const preview = document.getElementById('stagePreview');
    if (stage) {
        preview.textContent = stage;
        preview.style.color = '#3b5bdb';
        preview.style.fontWeight = '600';
    } else {
        preview.textContent = '스테이지 미지정';
        preview.style.color = 'var(--muted)';
        preview.style.fontWeight = 'normal';
    }
}
</script>
</body>
</html>
