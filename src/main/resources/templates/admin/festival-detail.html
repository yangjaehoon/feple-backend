<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'Feple Admin — ' + ${festival.title}">페스티벌 상세</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<div th:insert="~{admin/fragments :: navbar('festivals')}"></div>
<div class="main-content">
    <div class="page-header">
        <div>
            <h1 class="page-title" th:text="${festival.title}">페스티벌</h1>
            <div class="breadcrumb">
                <a th:href="@{/admin}">대시보드</a>
                <span class="bc-sep">›</span>
                <a th:href="@{/admin/festivals}">페스티벌</a>
                <span class="bc-sep">›</span>
                <span th:text="${festival.title}"></span>
            </div>
        </div>
    </div>
    <div class="content-area">

        <!-- Flash messages -->
        <div th:if="${successMessage}" class="alert alert-success"
             th:text="${successMessage}"></div>
        <div th:if="${errorMessage}"
             style="padding:12px 16px; border-radius:6px; font-size:13.5px; font-weight:500; margin-bottom:20px; background:#FFF5F5; color:#9B2C2C; border:1px solid #FC8181;"
             th:text="${errorMessage}"></div>

        <!-- 기본 정보 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">🎵 페스티벌 정보</div>
            </div>
            <div class="card-body">
                <div class="festival-info">
                    <img class="poster-img"
                         th:if="${festival.posterUrl != null and !#strings.isEmpty(festival.posterUrl)}"
                         th:src="${festival.posterUrl}"
                         th:alt="${festival.title}"/>
                    <div class="no-poster"
                         th:if="${festival.posterUrl == null or #strings.isEmpty(festival.posterUrl)}">
                        <span style="font-size:28px;">🖼️</span>
                        <span>포스터 없음</span>
                    </div>

                    <div class="meta-list">
                        <div class="meta-item">
                            <div class="meta-label">기간</div>
                            <div class="meta-value"
                                 th:text="${festival.startDate} + ' ~ ' + ${festival.endDate}"></div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">장소</div>
                            <div class="meta-value" th:text="${festival.location}"></div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">좋아요</div>
                            <div class="meta-value" style="color:var(--primary);">
                                ❤ <span th:text="${festival.likeCount}">0</span>
                            </div>
                        </div>
                        <div class="meta-item" th:if="${festival.description != null}">
                            <div class="meta-label">설명</div>
                            <div class="meta-value" th:text="${festival.description}"></div>
                        </div>
                    </div>
                </div>

                <div class="detail-actions">
                    <a th:href="@{/admin/festivals/{id}/edit(id=${festival.id})}" class="btn btn-warning">✏ 수정</a>
                    <a th:href="@{/admin/festivals/{id}/artists/new(id=${festival.id})}" class="btn btn-primary">+ 아티스트 추가</a>
                    <a th:href="@{/admin/festivals}" class="btn btn-secondary">목록</a>
                    <form th:action="@{/admin/festivals/{id}/delete(id=${festival.id})}"
                          method="post"
                          onsubmit="return confirm('이 페스티벌을 삭제할까요?');">
                        <button type="submit" class="btn btn-danger">삭제</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- 참여 아티스트 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    참여 아티스트
                    <span class="card-count" th:text="${participatingArtists.size() ?: 0}"></span>
                </div>
                <a class="btn btn-primary btn-sm"
                   th:href="@{/admin/festivals/{id}/artists/new(id=${festival.id})}">+ 추가</a>
            </div>

            <!-- 행별 편집 폼 (테이블 바깥에 위치 - HTML5 form 속성으로 연결) -->
            <div th:each="af : ${participatingArtists}" style="display:none;">
                <form th:id="|edit-form-${af.artistFestivalId}|"
                      th:action="@{/admin/festivals/{fId}/artists/{afId}/edit(fId=${festival.id}, afId=${af.artistFestivalId})}"
                      method="post"></form>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>순서</th>
                        <th>아티스트</th>
                        <th>장르</th>
                        <th>스테이지명</th>
                        <th>저장</th>
                        <th>삭제</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="af : ${participatingArtists}">
                        <td>
                            <input type="number" name="lineupOrder"
                                   th:value="${af.lineupOrder}"
                                   th:attr="form=|edit-form-${af.artistFestivalId}|"
                                   style="width:55px; padding:5px 6px; border:1px solid var(--border); border-radius:6px; font-size:13px; text-align:center;"/>
                        </td>
                        <td style="font-weight:600;" th:text="${af.artistName}"></td>
                        <td><span class="badge badge-genre" th:text="${af.artistGenre}"></span></td>
                        <td>
                            <input type="text" name="stageName"
                                   th:value="${af.stageName}"
                                   th:attr="form=|edit-form-${af.artistFestivalId}|"
                                   placeholder="스테이지명"
                                   style="width:130px; padding:5px 8px; border:1px solid var(--border); border-radius:6px; font-size:13px;"/>
                        </td>
                        <td>
                            <button type="submit"
                                    th:attr="form=|edit-form-${af.artistFestivalId}|"
                                    class="btn btn-warning btn-sm">저장</button>
                        </td>
                        <td>
                            <form th:action="@{/admin/festivals/{fId}/artists/{afId}/delete(fId=${festival.id}, afId=${af.artistFestivalId})}"
                                  method="post">
                                <button type="submit"
                                        class="btn btn-danger btn-sm"
                                        onclick="return confirm('삭제하시겠습니까?')">삭제</button>
                            </form>
                        </td>
                    </tr>
                    <tr class="empty-row" th:if="${participatingArtists.isEmpty() ?: true}">
                        <td colspan="6">참여 아티스트가 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 타임테이블 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    🕐 타임테이블
                    <span class="card-count" th:text="${timetableEntries.size() ?: 0}"></span>
                </div>
            </div>
            <div class="card-body">

                <!-- 추가 폼 -->
                <form th:action="@{/admin/festivals/{id}/timetable(id=${festival.id})}"
                      method="post"
                      style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr 1fr auto; gap:8px; align-items:end; margin-bottom:20px;">
                    <div>
                        <label style="font-size:11px; font-weight:600; color:var(--muted); display:block; margin-bottom:4px;">날짜</label>
                        <input type="date" name="festivalDate"
                               th:min="${festival.startDate}" th:max="${festival.endDate}"
                               th:value="${festival.startDate}"
                               required
                               style="width:100%; padding:7px 10px; border:1px solid var(--border); border-radius:8px; font-size:13px;"/>
                    </div>
                    <div>
                        <label style="font-size:11px; font-weight:600; color:var(--muted); display:block; margin-bottom:4px;">스테이지</label>
                        <input type="text" name="stageName" placeholder="Main / Sub1 ..." required
                               style="width:100%; padding:7px 10px; border:1px solid var(--border); border-radius:8px; font-size:13px;"/>
                    </div>
                    <div>
                        <label style="font-size:11px; font-weight:600; color:var(--muted); display:block; margin-bottom:4px;">아티스트명</label>
                        <input type="text" name="artistName" placeholder="아티스트 이름" required
                               style="width:100%; padding:7px 10px; border:1px solid var(--border); border-radius:8px; font-size:13px;"/>
                    </div>
                    <div>
                        <label style="font-size:11px; font-weight:600; color:var(--muted); display:block; margin-bottom:4px;">시작</label>
                        <input type="time" name="startTime" required
                               style="width:100%; padding:7px 10px; border:1px solid var(--border); border-radius:8px; font-size:13px;"/>
                    </div>
                    <div>
                        <label style="font-size:11px; font-weight:600; color:var(--muted); display:block; margin-bottom:4px;">종료</label>
                        <input type="time" name="endTime" required
                               style="width:100%; padding:7px 10px; border:1px solid var(--border); border-radius:8px; font-size:13px;"/>
                    </div>
                    <button type="submit" class="btn btn-primary" style="white-space:nowrap;">+ 추가</button>
                </form>

                <!-- 목록 테이블 -->
                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>날짜</th>
                            <th>스테이지</th>
                            <th>아티스트</th>
                            <th>시작</th>
                            <th>종료</th>
                            <th>삭제</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="entry : ${timetableEntries}">
                            <td th:text="${entry.festivalDate}"></td>
                            <td><span class="badge badge-genre" th:text="${entry.stageName}"></span></td>
                            <td style="font-weight:600;" th:text="${entry.artistName}"></td>
                            <td th:text="${entry.startTime}"></td>
                            <td th:text="${entry.endTime}"></td>
                            <td>
                                <form th:action="@{/admin/festivals/{fId}/timetable/{eId}/delete(fId=${festival.id},eId=${entry.id})}"
                                      method="post">
                                    <button type="submit" class="btn btn-danger btn-sm"
                                            onclick="return confirm('삭제하시겠습니까?')">삭제</button>
                                </form>
                            </td>
                        </tr>
                        <tr class="empty-row" th:if="${timetableEntries.isEmpty()}">
                            <td colspan="6">등록된 타임테이블이 없습니다.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
