<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${festival.title}">페스티벌 상세</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/admin}">🎪 Feple Admin</a>
    <div class="navbar-links">
        <a th:href="@{/admin}">홈</a>
        <a th:href="@{/admin/festivals}">페스티벌</a>
        <a th:href="@{/admin/artists}">아티스트</a>
    </div>
</nav>

<div class="container">
    <p class="page-title" th:text="${festival.title}">페스티벌</p>

    <!-- 기본 정보 -->
    <div class="card">
        <div class="festival-header">
            <img class="poster-img"
                 th:if="${festival.posterUrl != null and !#strings.isEmpty(festival.posterUrl)}"
                 th:src="${festival.posterUrl}"
                 th:alt="${festival.title} + ' 포스터'"/>
            <div class="no-poster"
                 th:if="${festival.posterUrl == null or #strings.isEmpty(festival.posterUrl)}">
                포스터 없음
            </div>

            <div class="festival-meta">
                <p><strong>기간</strong><br/>
                    <span th:text="${festival.startDate} + ' ~ ' + ${festival.endDate}"></span></p>
                <p><strong>장소</strong><br/>
                    <span th:text="${festival.location}"></span></p>
                <p><strong>설명</strong><br/>
                    <span th:text="${festival.description}"></span></p>
            </div>
        </div>

        <div class="actions">
            <a th:href="@{/admin/festivals/{id}/edit(id=${festival.id})}" class="btn btn-warning">수정</a>
            <a th:href="@{/admin/festivals/{id}/artists/new(id=${festival.id})}" class="btn btn-primary">+ 아티스트 추가</a>
            <a th:href="@{/admin/festivals}" class="btn btn-secondary">목록</a>
            <form th:action="@{/admin/festivals/{id}/delete(id=${festival.id})}"
                  method="post"
                  onsubmit="return confirm('이 페스티벌을 삭제할까요?');">
                <button type="submit" class="btn btn-danger">페스티벌 삭제</button>
            </form>
        </div>
    </div>

    <!-- 참여 아티스트 -->
    <div class="card">
        <p class="section-title">
            참여 아티스트
            <span class="badge badge-primary"
                  th:text="${participatingArtists.size() ?: 0}"></span>
        </p>

        <table>
            <thead>
            <tr>
                <th>순서</th>
                <th>아티스트</th>
                <th>장르</th>
                <th>스테이지</th>
                <th>삭제</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="af : ${participatingArtists}">
                <td th:text="${af.lineupOrder}"></td>
                <td th:text="${af.artistName}"></td>
                <td><span class="badge badge-genre" th:text="${af.artistGenre}"></span></td>
                <td th:text="${af.stageName}"></td>
                <td>
                    <form th:action="@{/admin/festivals/{festivalId}/artists/{artistFestivalId}/delete(festivalId=${festival.id}, artistFestivalId=${af.artistFestivalId})}"
                          method="post">
                        <button type="submit"
                                class="btn btn-danger btn-sm"
                                onclick="return confirm('삭제하시겠습니까?')">삭제</button>
                    </form>
                </td>
            </tr>
            <tr class="empty-row" th:if="${participatingArtists.isEmpty() ?: true}">
                <td colspan="5">참여 아티스트가 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
