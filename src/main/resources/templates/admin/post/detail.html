<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments :: head('게시글 상세')}"></head>
<body>
<div th:insert="~{admin/fragments :: navbar('posts')}"></div>
<div class="main-content">
    <div class="page-header">
        <div>
            <h1 class="page-title" th:text="${post.title}">게시글 제목</h1>
            <div class="breadcrumb">
                <a th:href="@{/admin}">대시보드</a>
                <span class="bc-sep">›</span>
                <a th:href="${backUrl}">게시글</a>
                <span class="bc-sep">›</span>
                <span th:text="${post.boardDisplayName}">상세</span>
            </div>
        </div>
    </div>
    <div class="content-area">

        <!-- 게시글 본문 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">📄 게시글</div>
                <div class="cell-actions">
                    <span class="badge"
                          th:classappend="${post.boardType != null} ? 'badge-primary' : 'badge-genre'"
                          th:text="${post.boardDisplayName}"></span>
                    <form th:action="@{/admin/posts/{id}/delete(id=${post.id})}" method="post">
                        <button type="submit"
                                class="btn btn-danger btn-sm"
                                data-confirm="이 게시글을 삭제할까요? 댓글도 모두 삭제됩니다.">삭제</button>
                    </form>
                </div>
            </div>
            <div class="card-body">
                <!-- 메타 정보 -->
                <div class="post-meta-row">
                    <div>
                        <div class="meta-label">작성자</div>
                        <div class="meta-value" th:text="${post.nickname}"></div>
                    </div>
                    <div>
                        <div class="meta-label">작성일</div>
                        <div class="meta-value"
                             th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></div>
                    </div>
                    <div>
                        <div class="meta-label">좋아요</div>
                        <div class="meta-value" th:text="${post.likeCount}"></div>
                    </div>
                    <div>
                        <div class="meta-label">댓글</div>
                        <div class="meta-value" th:text="${post.commentCount}"></div>
                    </div>
                </div>

                <!-- 제목 -->
                <div class="post-title" th:text="${post.title}"></div>

                <!-- 본문 -->
                <div class="post-body" th:text="${post.content}"></div>
            </div>
        </div>

        <!-- 댓글 목록 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    💬 댓글
                    <span class="card-count" th:text="${#lists.size(comments)}"></span>
                </div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>작성자</th>
                        <th>내용</th>
                        <th>작성일</th>
                        <th>삭제</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="comment : ${comments}">
                        <td class="td-id" th:text="${comment.id}"></td>
                        <td class="cell-bold-nowrap" th:text="${comment.nickname}"></td>
                        <td class="col-w480">
                            <span th:text="${comment.content}" class="td-ellipsis"></span>
                        </td>
                        <td class="td-date"
                            th:text="${comment.createdAt != null ? #temporals.format(comment.createdAt, 'MM-dd HH:mm') : '-'}"></td>
                        <td>
                            <form th:action="@{/admin/posts/comments/{id}/delete(id=${comment.id})}" method="post">
                                <input type="hidden" name="postId" th:value="${post.id}"/>
                                <button type="submit"
                                        class="btn btn-danger btn-sm"
                                        data-confirm="이 댓글을 삭제할까요?">삭제</button>
                            </form>
                        </td>
                    </tr>
                    <tr class="empty-row" th:if="${#lists.isEmpty(comments)}">
                        <td colspan="5">댓글이 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="back-row">
            <a th:href="${backUrl}" class="btn btn-secondary">← 목록으로</a>
        </div>

    </div>
</div>
</body>
</html>
