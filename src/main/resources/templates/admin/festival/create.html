<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments :: head('페스티벌 등록')}"></head>
<body>
<div th:insert="~{admin/fragments :: navbar('festivals')}"></div>
<div class="main-content">
    <div th:replace="~{admin/fragments :: pageHeader2('페스티벌 등록', '페스티벌', @{/admin/festivals}, '등록')}"></div>
    <div class="content-area">

        <div th:replace="~{admin/fragments :: formErrors}"></div>

        <div class="card card-form">
            <div class="card-header">
                <div class="card-title">새 페스티벌</div>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/festivals/new}"
                      th:object="${festival}"
                      method="post"
                      enctype="multipart/form-data">

                    <div class="form-grid">
                        <div class="form-group">
                            <label>제목 (한국어) <span class="required-star">*</span></label>
                            <input type="text" th:field="*{title}" placeholder="페스티벌 제목" required/>
                            <span class="field-error">제목을 입력해주세요.</span>
                        </div>

                        <div class="form-group">
                            <label>제목 (영어, 선택)</label>
                            <input type="text" th:field="*{titleEn}" placeholder="Festival Title in English (optional)"/>
                            <span class="field-hint">영어 모드에서 표시됩니다. 비워두면 한국어 제목이 표시됩니다.</span>
                        </div>

                        <div class="form-group">
                            <label>설명 <span class="required-star">*</span></label>
                            <textarea th:field="*{description}" placeholder="페스티벌 설명을 입력하세요" required></textarea>
                            <span class="field-error">설명을 입력해주세요.</span>
                        </div>

                        <div class="form-group">
                            <label>장소 <span class="required-star">*</span></label>
                            <input type="text" id="locationInput" name="location" th:value="*{location}" placeholder="행사 장소 (지도에서 선택하거나 직접 입력)" required/>
                            <span class="field-error">장소를 입력해주세요.</span>
                            <input type="hidden" id="latInput" name="latitude" th:value="*{latitude}"/>
                            <input type="hidden" id="lngInput" name="longitude" th:value="*{longitude}"/>
                            <div class="mt-8">
                                <div class="addr-row">
                                    <input type="text" id="addrSearch" placeholder="주소 또는 장소명 검색..."
                                           class="flex-1 form-input-sm"/>
                                    <button type="button" id="addr-search-btn"
                                            class="btn btn-primary">검색</button>
                                </div>
                                <div id="addr-search-error" class="field-error">검색 결과가 없습니다.</div>
                                <div id="kakaoMap" class="map-container"></div>
                                <p class="hint mt-4">지도를 클릭하거나 주소를 검색하면 위치가 자동으로 설정됩니다.</p>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>시작일 <span class="required-star">*</span></label>
                                <input type="date" th:field="*{startDate}" required/>
                                <span class="field-error">시작일을 선택해주세요.</span>
                            </div>
                            <div class="form-group">
                                <label>종료일 <span class="required-star">*</span></label>
                                <input type="date" th:field="*{endDate}"
                                       th:style="${#fields.hasErrors('endDate')} ? 'border-color: var(--danger)' : ''"
                                       required/>
                                <span th:if="${#fields.hasErrors('endDate')}" class="field-error"
                                      th:text="${#fields.errors('endDate')[0]}" style="display: block;"></span>
                                <span th:unless="${#fields.hasErrors('endDate')}" class="field-error">종료일을 선택해주세요.</span>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>포스터 이미지</label>
                            <input type="file" name="posterFile" accept=".jpg,.jpeg,.png,.gif"/>
                            <span class="field-hint">jpg, jpeg, png, gif만 지원합니다.</span>
                        </div>

                        <div class="form-group">
                            <label>지역</label>
                            <select th:field="*{region}" class="compact-input">
                                <option value="">선택 안 함</option>
                                <option th:each="r : ${allRegions}" th:value="${r}" th:text="${r.displayName}"></option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>연령 제한</label>
                            <select th:field="*{ageRestriction}" class="compact-input">
                                <option th:each="a : ${allAgeRestrictions}" th:value="${a}" th:text="${a.displayName}"></option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>장르 <span class="label-optional">(복수 선택 가능)</span></label>
                            <div class="genre-list mt-4">
                                <label th:each="g : ${allGenres}" class="genre-tag">
                                    <input type="checkbox" name="genres" th:value="${g}"
                                           th:checked="${festival.genres != null and festival.genres.contains(g)}"
                                           class="cb-input"/>
                                    <span th:text="${g.displayName}"></span>
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>참여 아티스트 <span class="label-optional">(선택사항)</span></label>
                            <input type="text" id="artistSearch" placeholder="아티스트 검색..."
                                   class="form-input mb-8"/>
                            <div id="artistList" class="artist-list-box">
                                <div th:each="artist : ${allArtists}"
                                     class="artist-item"
                                     th:data-name="${#strings.toLowerCase(artist.name)}">
                                    <label class="artist-item-label">
                                        <input type="checkbox" name="artistIds" th:value="${artist.id}" class="cb-input"/>
                                        <span th:text="${artist.name + (artist.genre != null ? ' (' + artist.genre + ')' : '')}"></span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">등록하기</button>
                        <a th:href="@{/admin/festivals}" class="btn btn-secondary">취소</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script type="text/javascript" th:src="'https://dapi.kakao.com/v2/maps/sdk.js?appkey=' + ${kakaoMapsKey} + '&libraries=services&autoload=false'"></script>
<script th:src="@{/js/admin-festival-form.js}"></script>
</body>
</html>
