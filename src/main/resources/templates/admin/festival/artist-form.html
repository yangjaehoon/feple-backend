<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments :: head('아티스트 추가')}"></head>
<body>
<div th:insert="~{admin/fragments :: navbar('festivals')}"></div>
<div class="main-content">
    <div class="page-header">
        <div>
            <h1 class="page-title">아티스트 추가</h1>
            <div class="breadcrumb">
                <a th:href="@{/admin}">대시보드</a>
                <span class="bc-sep">›</span>
                <a th:href="@{/admin/festivals}">페스티벌</a>
                <span class="bc-sep">›</span>
                <a th:href="@{/admin/festivals/{id}(id=${festival.id})}"
                   th:text="${festival.title}"></a>
                <span class="bc-sep">›</span>
                <span>아티스트 추가</span>
            </div>
        </div>
    </div>
    <div class="content-area">
        <div class="card card-narrow-520">
            <div class="card-header">
                <div class="card-title">
                    🎤 아티스트 추가
                    <span class="card-title-note" th:text="'— ' + ${festival.title}"></span>
                </div>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/festivals/{id}/artists(id=${festival.id})}"
                      method="post">

                    <div class="form-group">
                        <label>아티스트 검색</label>
                        <input type="text" id="artistSearch" placeholder="이름으로 검색..."
                               class="search-input mb-8"/>
                        <div class="hint mb-6">
                            <span id="selectedCount">0</span>명 선택됨
                        </div>
                        <div class="hint mb-8">
                            <span class="artist-legend-dot"></span>이미 참여 중인 아티스트
                        </div>
                        <div id="artistList" class="artist-list-box">
                            <div th:each="artist : ${artists}"
                                 class="artist-item"
                                 th:data-name="${#strings.toLowerCase(artist.name)}"
                                 th:data-name-en="${artist.nameEn != null ? #strings.toLowerCase(artist.nameEn) : ''}"
                                 th:classappend="${participatingIds.contains(artist.id)} ? ' already-in' : ''">
                                <label>
                                    <input type="checkbox" name="artistIds" th:value="${artist.id}"
                                           th:checked="${participatingIds.contains(artist.id)}"
                                           class="song-check"/>
                                    <span th:text="${artist.name} + (${artist.genre} != null ? ' (' + ${artist.genre} + ')' : '')"></span>
                                    <span th:if="${participatingIds.contains(artist.id)}"
                                          class="artist-participating-badge">참여 중</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">추가하기</button>
                        <a th:href="@{/admin/festivals/{id}(id=${festival.id})}" class="btn btn-secondary">취소</a>
                    </div>
                </form>
            </div>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger mt-8" th:text="${errorMessage}"></div>
    </div>
</div>
<script th:src="@{/js/admin-festival-artist-form.js}"></script>
</body>
</html>
