<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- ── 기본 정보 + 별점 통계 ── -->
<th:block th:fragment="infoCard">
    <div id="info" class="card">
        <div class="card-header">
            <div class="card-title">🎵 페스티벌 정보</div>
        </div>
        <div class="card-body">
            <div class="festival-info">
                <img class="poster-img"
                     th:if="${!#strings.isEmpty(festival.posterUrl)}"
                     th:src="${festival.posterUrl}" th:alt="${festival.title}"/>
                <div class="no-poster"
                     th:unless="${!#strings.isEmpty(festival.posterUrl)}">
                    <span class="icon-xl">🖼️</span>
                    <span>포스터 없음</span>
                </div>
                <div class="meta-list">
                    <div class="meta-item">
                        <div class="meta-label">기간</div>
                        <div class="meta-value" th:text="${festival.startDate} + ' ~ ' + ${festival.endDate}"></div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">장소</div>
                        <div class="meta-value" th:text="${festival.location}"></div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">좋아요</div>
                        <div class="meta-value meta-value-primary">
                            ❤ <span th:text="${festival.likeCount}">0</span>
                        </div>
                    </div>
                    <div class="meta-item" th:if="${!#strings.isEmpty(festival.description)}">
                        <div class="meta-label">설명</div>
                        <div class="meta-value" th:text="${festival.description}"></div>
                    </div>
                </div>
            </div>
            <div class="detail-actions">
                <a th:href="@{/admin/festivals/{id}/edit(id=${festival.id})}" class="btn btn-warning">✏ 수정</a>
                <a th:href="@{/admin/festivals/{id}/artists/new(id=${festival.id})}" class="btn btn-primary">+ 아티스트 추가</a>
                <a th:href="${returnUrl}" class="btn btn-secondary">목록</a>
                <form th:action="@{/admin/festivals/{id}/delete(id=${festival.id})}"
                      method="post" data-confirm="이 페스티벌을 삭제할까요?">
                    <button type="submit" class="btn btn-danger">삭제</button>
                </form>
            </div>
        </div>
    </div>

    <!-- 별점 통계 -->
    <div class="card card-padded" th:if="${ratingStats != null}">
        <div class="card-header">
            <div class="card-title">별점 통계</div>
        </div>
        <div th:if="${ratingStats.ratingCount == 0}" class="cell-secondary rating-empty-hint">
            아직 별점 평가가 없습니다.
        </div>
        <div th:if="${ratingStats.ratingCount > 0}">
            <div class="rating-summary">
                <div class="rating-score-block">
                    <div class="rating-score-num"
                         th:text="${#numbers.formatDecimal(ratingStats.averageRating, 1, 1)}"></div>
                    <div class="rating-stars-display">
                        <th:block th:each="i : ${#numbers.sequence(1,5)}"
                                  th:text="${i <= ratingStats.averageRating} ? '★' : '☆'"></th:block>
                    </div>
                    <div class="cell-secondary rating-count-hint"
                         th:text="${ratingStats.ratingCount} + '명 평가'"></div>
                </div>
                <div class="rating-bar-section">
                    <th:block th:each="entry : ${ratingStats.distribution}">
                        <div class="rating-bar-row">
                            <span class="rating-bar-label"
                                  th:text="${entry.key} + '★'"></span>
                            <div class="rating-bar-track">
                                <div class="rating-bar-fill"
                                     th:style="'width:' + (${ratingStats.ratingCount > 0} ? ${#numbers.formatDecimal(entry.value * 100.0 / ratingStats.ratingCount, 1, 0)} : 0) + '%'"></div>
                            </div>
                            <span class="cell-secondary rating-bar-count"
                                  th:text="${entry.value} + '명'"></span>
                        </div>
                    </th:block>
                </div>
            </div>
        </div>
    </div>
</th:block>

</body>
</html>
