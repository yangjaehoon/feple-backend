<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- ── 타임테이블 ── -->
<div th:fragment="timetableCard" id="timetable" class="card">
    <div class="card-header">
        <div class="card-title">
            🕐 타임테이블
            <span class="card-count" th:text="${#lists.size(timetableEntries)}"></span>
        </div>
    </div>
    <div class="card-body">

        <!-- ── 스테이지 관리 영역 ── -->
        <div class="stage-box">
            <div class="stage-box-title">📋 스테이지 목록</div>
            <div th:if="${stages.isEmpty()}" class="stage-empty">등록된 스테이지가 없습니다. 아래에서 추가해주세요.</div>
            <div th:if="${!stages.isEmpty()}" class="stage-list">
                <div th:each="s, stat : ${stages}" class="stage-row" th:data-stage="${s.name}">
                    <div class="stage-order-num" th:text="${stat.index + 1}"></div>
                    <span class="stage-name" th:text="${s.name}"></span>
                    <!-- 위로 -->
                    <form th:action="@{/admin/festivals/{id}/stages/{sid}/up(id=${festival.id}, sid=${s.id})}"
                          method="post">
                        <button type="submit" class="stage-btn"
                                th:disabled="${stat.first}" title="위로">▲</button>
                    </form>
                    <!-- 아래로 -->
                    <form th:action="@{/admin/festivals/{id}/stages/{sid}/down(id=${festival.id}, sid=${s.id})}"
                          method="post">
                        <button type="submit" class="stage-btn"
                                th:disabled="${stat.last}" title="아래로">▼</button>
                    </form>
                    <!-- 삭제 -->
                    <form th:action="@{/admin/festivals/{id}/stages/{sid}/delete(id=${festival.id}, sid=${s.id})}"
                          method="post"
                          data-confirm="스테이지를 삭제할까요?">
                        <button type="submit" class="stage-btn del" title="삭제">✕</button>
                    </form>
                </div>
            </div>
            <form th:action="@{/admin/festivals/{id}/stages(id=${festival.id})}"
                  method="post" class="stage-add-inline">
                <input type="text" name="name" placeholder="스테이지명 (예: Main, Sub1)" maxlength="30"/>
                <button type="submit" class="btn btn-primary btn-sm">+ 스테이지 추가</button>
            </form>
        </div>

        <!-- 타임테이블 추가 폼 -->
        <form id="timetable-add-form"
              th:action="@{/admin/festivals/{id}/timetable(id=${festival.id})}"
              method="post"
              class="form-grid-5col">

            <input type="hidden" name="stageName" id="autoStageName"/>
            <input type="hidden" name="festivalDate" id="autoFestivalDate"/>

            <div>
                <label class="form-label-sm">아티스트</label>
                <th:block th:if="${!participatingArtistsByName.isEmpty()}">
                    <!-- name 없음 — JS가 artistNameHidden에 값을 동기화 -->
                    <select id="artistSelect" class="compact-input">
                        <option value="" disabled selected>아티스트 선택</option>
                        <option th:each="af : ${participatingArtistsByName}"
                                th:value="${af.artistName}"
                                th:text="${af.artistName}"
                                th:attr="data-stage=${af.stageName},data-date=${af.performanceDate}"></option>
                    </select>
                    <input type="hidden" id="artistNameHidden" name="artistName"/>
                </th:block>
                <th:block th:if="${participatingArtistsByName.isEmpty()}">
                    <input type="text" name="artistName" required class="compact-input"
                           placeholder="아티스트명 입력"/>
                </th:block>
            </div>
            <div>
                <label class="form-label-sm">날짜 (자동)</label>
                <div id="datePreview" class="preview-input">아티스트 선택 시 자동 입력</div>
            </div>
            <div>
                <label class="form-label-sm">스테이지 (자동)</label>
                <div id="stagePreview" class="preview-input">
                    아티스트 선택 시 자동 입력
                </div>
            </div>
            <div>
                <div class="form-grid-2col">
                    <div>
                        <label class="form-label-sm">시작</label>
                        <input type="time" name="startTime" id="startTime" required
                               class="compact-input"/>
                    </div>
                    <div>
                        <label class="form-label-sm">종료</label>
                        <input type="time" name="endTime" id="endTime" required
                               class="compact-input"/>
                    </div>
                </div>
                <div id="timeError" class="time-error">
                    ⚠ 종료 시간은 시작 시간보다 늦어야 합니다.
                </div>
            </div>
            <!-- 크루 공연 설정 (전체 너비) -->
            <div class="timetable-crew-col" th:if="${!participatingArtistsByName.isEmpty()}">
                <div class="crew-section">
                    <div class="crew-section-title">
                        크루 공연 설정 (선택 — 일반 공연은 비워두세요)
                    </div>
                    <div class="crew-fields-row">
                        <div class="crew-name-field">
                            <label class="form-label-sm">크루 이름</label>
                            <input type="text" id="crewNameInput" class="compact-input"
                                   maxlength="200" placeholder="예: LOUDX, BE:MBLEM 크루"/>
                        </div>
                        <div>
                            <label class="form-label-sm">날짜</label>
                            <input type="date" id="crewDateInput" class="compact-input"
                                   th:min="${festival.startDate}" th:max="${festival.endDate}"/>
                        </div>
                        <div>
                            <label class="form-label-sm">스테이지</label>
                            <select id="crewStageInput" class="compact-input">
                                <option value="">스테이지 선택</option>
                                <option th:each="s : ${stages}" th:value="${s.name}" th:text="${s.name}"></option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="form-label-sm">크루 멤버</label>
                        <div class="crew-member-list">
                            <label th:each="af : ${participatingArtistsByName}"
                                   class="crew-member-chip">
                                <input type="checkbox" name="memberArtistIds"
                                       th:value="${af.artistId}"/>
                                <span th:text="${af.artistName}"></span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
            <div class="timetable-form-footer">
                <button type="submit" class="btn btn-primary">+ 추가</button>
            </div>
        </form>

        <!-- 운영 항목 추가 폼 -->
        <div class="ops-box">
            <div class="ops-box-title">📢 운영 항목 추가 (티켓 부스 오픈, 입장 게이트 오픈 등)</div>
            <form id="ops-add-form"
                  th:action="@{/admin/festivals/{id}/timetable(id=${festival.id})}"
                  method="post"
                  class="form-grid-ops">
                <input type="hidden" name="stageName" th:value="${announcementStageName}"/>
                <input type="hidden" name="color" id="ops-color-value"/>
                <div>
                    <label class="form-label-ops">항목명 (엔터로 줄바꿈)</label>
                    <textarea name="artistName" placeholder="예: 티켓 부스 오픈&#10;입장 게이트 오픈" required maxlength="200"
                              class="compact-input-ops" rows="2" style="resize: none;"></textarea>
                </div>
                <div>
                    <label class="form-label-ops">날짜</label>
                    <input type="date" name="festivalDate"
                           th:min="${festival.startDate}" th:max="${festival.endDate}"
                           th:value="${festival.startDate}" required
                           class="compact-input-ops"/>
                </div>
                <div>
                    <label class="form-label-ops">시작</label>
                    <input type="time" name="startTime" required
                           class="compact-input-ops"/>
                </div>
                <div>
                    <label class="form-label-ops">종료</label>
                    <input type="time" name="endTime" required
                           class="compact-input-ops"/>
                </div>
                <button type="submit" class="btn btn-warning btn-nowrap">+ 추가</button>
                <!-- 색상 선택 (전체 너비) -->
                <div class="ops-color-section">
                    <label class="form-label-ops">색상</label>
                    <div th:replace="~{admin/fragments :: colorPicker('ops-color-value', true)}"></div>
                </div>
            </form>
        </div>

        <!-- 목록 테이블 -->
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>구분</th>
                    <th>시간</th>
                    <th>아티스트 / 항목</th>
                    <th>수정</th>
                    <th>삭제</th>
                </tr>
                </thead>
                <tbody>
                <th:block th:each="entry, stat : ${timetableEntries}">
                    <!-- 날짜 구분 헤더: 첫 항목이거나 날짜가 바뀔 때 -->
                    <tr th:if="${stat.first or entry.festivalDate != timetableEntries[stat.index - 1].festivalDate}"
                        class="tt-date-row">
                        <td colspan="5" class="tt-date-cell">
                            📅 <span th:text="${entry.festivalDate}"></span>
                        </td>
                    </tr>
                    <!-- 항목 행: 운영 항목은 노란 배경 -->
                    <tr th:classappend="${entry.stageName == announcementStageName} ? 'bg-warning-subtle' : ''"
                        th:style="${entry.stageName == announcementStageName and entry.color != null and !#strings.isEmpty(entry.color)} ? 'border-left: 4px solid ' + ${entry.color} + '; padding-left: 0;' : ''">
                        <td>
                            <span th:if="${entry.stageName == announcementStageName}" class="ops-label">
                                <span th:if="${entry.color != null and !#strings.isEmpty(entry.color)}"
                                      class="color-dot"
                                      th:style="'background:' + ${entry.color}"></span>
                                <span th:text="${announcementStageName + ' 운영'}"></span>
                            </span>
                            <span th:unless="${entry.stageName == announcementStageName}"
                                  class="badge badge-stage" th:data-stage="${entry.stageName}"
                                  th:text="${!#strings.isEmpty(entry.stageName) ? entry.stageName : '미지정'}"></span>
                        </td>
                        <td class="td-time">
                            <span class="text-bold" th:text="${entry.startTime}"></span>
                            <span class="sep-muted">~</span>
                            <span class="text-bold" th:text="${entry.endTime}"></span>
                        </td>
                        <td class="td-bold" th:text="${entry.artistName}" style="white-space: pre-line;"></td>
                        <td>
                            <button type="button" class="btn btn-primary btn-sm"
                                    th:data-id="${entry.id}"
                                    th:data-festival="${festival.id}"
                                    th:data-artist="${entry.artistName}"
                                    th:data-date="${entry.festivalDate}"
                                    th:data-start="${entry.startTime}"
                                    th:data-end="${entry.endTime}"
                                    th:data-stage="${entry.stageName}"
                                    th:data-color="${entry.color}"
                                    th:data-member-ids="${entry.memberArtistIdsStr}"
                                    onclick="openTimetableEdit(this)">수정</button>
                        </td>
                        <td>
                            <form th:action="@{/admin/festivals/{fId}/timetable/{eId}/delete(fId=${festival.id},eId=${entry.id})}"
                                  method="post">
                                <button type="submit" class="btn btn-ghost-danger btn-sm"
                                        data-confirm="타임테이블 항목을 삭제하시겠습니까?">삭제</button>
                            </form>
                        </td>
                    </tr>
                </th:block>
                <tr th:if="${timetableEntries.isEmpty()}" th:replace="~{admin/fragments :: emptyRow(5, '등록된 타임테이블이 없습니다.')}"></tr>
                </tbody>
            </table>
        </div>

        <!-- 타임테이블 수정 모달 -->
        <div id="tt-edit-modal" class="modal-overlay">
            <div class="modal-box">
                <div class="modal-header">
                    <span class="modal-title">타임테이블 항목 수정</span>
                    <button type="button" class="modal-close" onclick="closeTimetableEdit()">✕</button>
                </div>
                <form id="tt-edit-form" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div style="margin-bottom:12px">
                        <label class="form-label-sm">스테이지</label>
                        <select name="stageName" id="tt-edit-stageName" class="compact-input" style="width:100%">
                            <option value="">스테이지 없음</option>
                            <option th:each="s : ${stages}" th:value="${s.name}" th:text="${s.name}"></option>
                        </select>
                    </div>
                    <div style="margin-bottom:12px">
                        <label class="form-label-sm">아티스트 / 항목명</label>
                        <th:block th:if="${!participatingArtistsByName.isEmpty()}">
                            <select id="tt-edit-artistSelect" class="compact-input"
                                    style="width:100%; margin-bottom:6px"
                                    onchange="onTtEditArtistChange(this)">
                                <option th:each="af : ${participatingArtistsByName}"
                                        th:value="${af.artistName}"
                                        th:text="${af.artistName}"></option>
                                <option value="__direct__">-- 직접 입력 --</option>
                            </select>
                        </th:block>
                        <textarea name="artistName" id="tt-edit-artistName"
                                  class="compact-input" style="width:100%; resize: none;" required maxlength="200"
                                  rows="2" placeholder="항목명 직접 입력"></textarea>
                    </div>
                    <div style="margin-bottom:12px">
                        <label class="form-label-sm">날짜</label>
                        <input type="date" name="festivalDate" id="tt-edit-date"
                               th:min="${festival.startDate}" th:max="${festival.endDate}"
                               class="compact-input" style="width:100%" required/>
                    </div>
                    <div class="form-grid-2col" style="margin-bottom:4px">
                        <div>
                            <label class="form-label-sm">시작</label>
                            <input type="time" name="startTime" id="tt-edit-start"
                                   class="compact-input" required/>
                        </div>
                        <div>
                            <label class="form-label-sm">종료</label>
                            <input type="time" name="endTime" id="tt-edit-end"
                                   class="compact-input" required/>
                        </div>
                    </div>
                    <div id="tt-edit-time-error" class="time-error">⚠ 종료 시간은 시작 시간보다 늦어야 합니다.</div>
                    <div style="margin-top:12px; margin-bottom:12px" th:if="${!participatingArtistsByName.isEmpty()}">
                        <label class="form-label-sm" style="font-size:11px; color:#6b7280;">
                            크루 멤버 (선택 — 일반 공연은 비워두세요)
                        </label>
                        <div style="display:flex; flex-wrap:wrap; gap:6px; margin-top:6px;">
                            <label th:each="af : ${participatingArtistsByName}"
                                   style="display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border:1px solid #d1d5db; border-radius:6px; cursor:pointer; font-size:12px; background:#fff; user-select:none;">
                                <input type="checkbox" name="memberArtistIds"
                                       class="tt-edit-member-cb"
                                       th:value="${af.artistId}" style="margin:0; cursor:pointer;"/>
                                <span th:text="${af.artistName}"></span>
                            </label>
                        </div>
                    </div>
                    <div style="margin-top:12px; margin-bottom:4px">
                        <label class="form-label-sm">색상</label>
                        <div th:replace="~{admin/fragments :: colorPicker('tt-edit-color-value', false)}"></div>
                        <input type="hidden" name="color" id="tt-edit-color-value"/>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-ghost" onclick="closeTimetableEdit()">취소</button>
                        <button type="submit" class="btn btn-primary">저장</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
