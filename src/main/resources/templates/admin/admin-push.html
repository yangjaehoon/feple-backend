<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Feple Admin — 푸시 알림 발송</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<div th:insert="~{admin/fragments :: navbar('push')}"></div>
<div class="main-content">
    <div class="page-header">
        <div>
            <h1 class="page-title">푸시 알림 발송</h1>
            <div class="breadcrumb">
                <a th:href="@{/admin}">대시보드</a>
                <span class="bc-sep">›</span>
                <span>푸시 알림</span>
            </div>
        </div>
    </div>
    <div class="content-area">

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}"   class="alert alert-danger"  th:text="${errorMessage}"></div>

        <div class="card" style="max-width:640px;">
            <div class="card-header">
                <div class="card-title">전체 회원 공지 발송</div>
                <div class="card-count" th:text="${deviceCount} + '명 수신 가능'"></div>
            </div>
            <div style="padding:24px;">
                <form th:action="@{/admin/push}" method="post"
                      onsubmit="return confirm('전체 ' + document.getElementById('device-count').textContent + '에게 푸시 알림을 발송하시겠습니까?')">
                    <div style="margin-bottom:16px;">
                        <label style="display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:var(--text-1);">제목 *</label>
                        <input type="text" name="title" required maxlength="100"
                               placeholder="알림 제목 (최대 100자)"
                               style="width:100%; padding:9px 12px; border:1px solid var(--border); border-radius:8px; font-size:14px;"/>
                    </div>
                    <div style="margin-bottom:24px;">
                        <label style="display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:var(--text-1);">내용 *</label>
                        <textarea name="body" required maxlength="300" rows="4"
                                  placeholder="알림 내용 (최대 300자)"
                                  style="width:100%; padding:9px 12px; border:1px solid var(--border); border-radius:8px; font-size:14px; resize:vertical;"></textarea>
                    </div>
                    <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
                        <button type="submit" class="btn btn-primary">발송하기</button>
                        <span id="device-count" style="font-size:13px; color:var(--muted);"
                              th:text="${deviceCount} + '명'"></span>
                        <span style="font-size:12px; color:var(--muted);">의 기기로 발송됩니다.</span>
                    </div>

                    <hr style="margin:24px 0; border-color:var(--border);"/>

                    <div style="font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:12px;">
                        테스트 발송
                    </div>

                    <!-- 닉네임 검색 -->
                    <div style="margin-bottom:12px;">
                        <label style="display:block; font-size:12px; font-weight:600; margin-bottom:5px; color:var(--text-2);">닉네임으로 검색</label>
                        <div style="display:flex; gap:8px; align-items:center;">
                            <input type="text" id="nickname-search" placeholder="앱 닉네임 입력"
                                   style="width:200px; padding:8px 10px; border:1px solid var(--border); border-radius:8px; font-size:14px;"
                                   onkeydown="if(event.key==='Enter'){event.preventDefault();searchNickname();}"/>
                            <button type="button" class="btn btn-secondary" style="padding:8px 14px;" onclick="searchNickname()">검색</button>
                        </div>
                        <div id="search-result" style="margin-top:8px; font-size:13px; display:none;"></div>
                    </div>

                    <!-- 사용자 ID + 발송 -->
                    <div style="display:flex; align-items:flex-end; gap:10px; flex-wrap:wrap;">
                        <div>
                            <label style="display:block; font-size:12px; font-weight:600; margin-bottom:5px; color:var(--text-2);">앱 사용자 ID</label>
                            <input type="number" name="targetUserId" id="target-user-id" min="1"
                                   placeholder="예) 42"
                                   style="width:130px; padding:8px 10px; border:1px solid var(--border); border-radius:8px; font-size:14px;"/>
                        </div>
                        <button type="submit"
                                formaction="/admin/push/test"
                                formnovalidate
                                onclick="return validateTest(this.form)"
                                class="btn btn-secondary">나에게 발송</button>
                        <span style="font-size:12px; color:var(--muted); line-height:1.5;">
                            위 제목·내용으로 해당 사용자 기기에만 발송됩니다.<br/>이력에 저장되지 않습니다.
                        </span>
                    </div>
                </form>
            </div>
        </div>

        <div class="card" style="max-width:640px; margin-top:20px;">
            <div class="card-header">
                <div class="card-title">주의사항</div>
            </div>
            <div style="padding:20px; font-size:13.5px; line-height:1.8; color:var(--text-2);">
                <ul style="margin:0; padding-left:18px;">
                    <li>앱에 로그인하여 알림 권한을 허용한 회원에게만 발송됩니다.</li>
                    <li>발송된 알림은 취소할 수 없습니다.</li>
                    <li>모든 발송 내역은 감사 로그에 기록됩니다.</li>
                    <li>테스트 발송은 별도 테스트 계정에서 진행해주세요.</li>
                </ul>
            </div>
        </div>

        <div class="card" style="margin-top:32px;">
            <div class="card-header">
                <div class="card-title">공지 발송 이력</div>
                <div class="card-count" th:text="${#lists.size(history)} + '건'"></div>
            </div>
            <div th:if="${#lists.isEmpty(history)}"
                 style="padding:32px; text-align:center; color:var(--muted); font-size:14px;">
                발송 이력이 없습니다.
            </div>
            <div th:unless="${#lists.isEmpty(history)}" class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th style="width:160px;">발송 시각</th>
                            <th style="width:220px;">제목</th>
                            <th>내용</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${history}">
                            <td style="color:var(--muted); font-size:13px; white-space:nowrap;"
                                th:text="${#temporals.format(item.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                            <td style="font-weight:600;" th:text="${item.title}"></td>
                            <td style="color:var(--text-2); font-size:13px;">
                                <span th:text="${#strings.length(item.body) > 80 ? #strings.substring(item.body, 0, 80) + '…' : item.body}"></span>
                                <button th:if="${#strings.length(item.body) > 80}"
                                        type="button"
                                        class="btn-link-inline"
                                        th:data-title="${item.title}"
                                        th:data-body="${item.body}"
                                        th:data-created-at="${#temporals.format(item.createdAt, 'yyyy-MM-dd HH:mm')}"
                                        onclick="openBroadcastModal(this)">전체보기</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<!-- 공지 내용 전체보기 모달 -->
<div id="broadcast-modal"
     style="display:none; position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,.45); align-items:center; justify-content:center;">
    <div style="background:#fff; border-radius:12px; padding:28px 28px 24px; width:520px; max-width:calc(100vw - 32px); box-shadow:0 8px 32px rgba(0,0,0,.18);">
        <div style="display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:18px; gap:12px;">
            <div>
                <div id="modal-title" style="font-size:16px; font-weight:700; color:var(--text-1);"></div>
                <div id="modal-date"  style="font-size:12px; color:var(--muted); margin-top:4px;"></div>
            </div>
            <button type="button" onclick="closeBroadcastModal()"
                    style="background:none; border:none; cursor:pointer; color:var(--muted); font-size:20px; line-height:1; padding:0; flex-shrink:0;">&times;</button>
        </div>
        <div id="modal-body"
             style="font-size:14px; color:var(--text-2); line-height:1.7; white-space:pre-wrap;
                    background:var(--surface,#f8f9fa); border-radius:8px; padding:16px; max-height:360px; overflow-y:auto;"></div>
        <div style="margin-top:20px; text-align:right;">
            <button type="button" class="btn btn-secondary" onclick="closeBroadcastModal()">닫기</button>
        </div>
    </div>
</div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script>
    async function searchNickname() {
        const nickname = document.getElementById('nickname-search').value.trim();
        const resultEl = document.getElementById('search-result');
        if (!nickname) { resultEl.style.display = 'none'; return; }

        resultEl.style.display = 'block';
        resultEl.style.color = 'var(--muted)';
        resultEl.textContent = '검색 중...';

        try {
            const res = await fetch('/admin/push/search-user?nickname=' + encodeURIComponent(nickname));
            const data = await res.json();
            if (res.ok) {
                resultEl.style.color = 'var(--primary)';
                resultEl.innerHTML =
                    '<strong>' + data.nickname + '</strong> (ID: ' + data.id + ')' +
                    ' &nbsp;<button type="button" onclick="fillUserId(' + data.id + ')" ' +
                    'style="font-size:12px; padding:2px 10px;" class="btn btn-secondary">이 ID로 설정</button>';
            } else {
                resultEl.style.color = 'var(--danger, #dc3545)';
                resultEl.textContent = data.error || '사용자를 찾을 수 없습니다.';
            }
        } catch (e) {
            resultEl.style.color = 'var(--danger, #dc3545)';
            resultEl.textContent = '검색 중 오류가 발생했습니다.';
        }
    }

    function fillUserId(id) {
        document.getElementById('target-user-id').value = id;
    }

    function validateTest(form) {
        const title = form.querySelector('[name="title"]').value.trim();
        const body  = form.querySelector('[name="body"]').value.trim();
        const uid   = form.querySelector('[name="targetUserId"]').value.trim();
        if (!title || !body) { alert('제목과 내용을 입력해주세요.'); return false; }
        if (!uid)            { alert('테스트 대상 사용자 ID를 입력해주세요.'); return false; }
        return confirm('사용자 ID ' + uid + ' 에게 테스트 발송하시겠습니까?');
    }

    function openBroadcastModal(btn) {
        document.getElementById('modal-title').textContent = btn.dataset.title;
        document.getElementById('modal-date').textContent  = btn.dataset.createdAt;
        document.getElementById('modal-body').textContent  = btn.dataset.body;
        const modal = document.getElementById('broadcast-modal');
        modal.style.display = 'flex';
    }

    function closeBroadcastModal() {
        document.getElementById('broadcast-modal').style.display = 'none';
    }

    document.getElementById('broadcast-modal').addEventListener('click', function (e) {
        if (e.target === this) closeBroadcastModal();
    });

    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeBroadcastModal();
    });
</script>
</body>
</html>
