<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Feple Admin — 인증 관리</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<div th:insert="~{admin/fragments :: navbar('certifications')}"></div>
<div class="main-content">
    <div class="page-header">
        <div>
            <h1 class="page-title">인증 관리</h1>
            <div class="breadcrumb">
                <a th:href="@{/admin}">대시보드</a>
                <span class="bc-sep">›</span>
                <span>인증 관리</span>
            </div>
        </div>
    </div>
    <div class="content-area">

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

        <div class="card">
            <!-- 검색 바 -->
            <div class="cert-search-bar">
                <form th:action="@{/admin/certifications}" method="get"
                      style="display:flex; gap:8px; align-items:center;">
                    <input type="hidden" name="status" th:value="${status}"/>
                    <input type="text" name="keyword" th:value="${keyword}"
                           placeholder="신청자 닉네임 또는 페스티벌명 검색..."
                           style="padding:7px 12px; border:1px solid var(--border); border-radius:7px; font-size:13px; width:280px;"/>
                    <button type="submit" class="btn btn-secondary btn-sm">검색</button>
                    <a th:if="${keyword != null and !#strings.isEmpty(keyword)}"
                       th:href="@{/admin/certifications(status=${status})}"
                       class="btn btn-secondary btn-sm">✕ 초기화</a>
                </form>
            </div>

            <!-- 필터 탭 -->
            <div style="padding:0 22px; border-bottom:1px solid var(--border); display:flex; gap:4px;">
                <a th:href="@{/admin/certifications(status='', page=0)}"
                   th:classappend="${status == '' or status == null} ? ' active' : ''"
                   class="type-tab">
                    전체
                    <span class="card-count" th:text="${certifications.totalElements}"></span>
                </a>
                <a th:href="@{/admin/certifications(status='PENDING', page=0)}"
                   th:classappend="${status == 'PENDING'} ? ' active' : ''"
                   class="type-tab">대기중</a>
                <a th:href="@{/admin/certifications(status='APPROVED', page=0)}"
                   th:classappend="${status == 'APPROVED'} ? ' active' : ''"
                   class="type-tab">승인됨</a>
                <a th:href="@{/admin/certifications(status='REJECTED', page=0)}"
                   th:classappend="${status == 'REJECTED'} ? ' active' : ''"
                   class="type-tab">거절됨</a>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th style="width:48px;">ID</th>
                        <th>신청자</th>
                        <th>페스티벌</th>
                        <th style="width:80px;">상태</th>
                        <th style="width:120px;">신청일</th>
                        <th style="width:100px;">액션</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="cert : ${certifications.content}">
                        <td class="td-id" th:text="${cert.id}"></td>
                        <td>
                            <a th:href="@{/admin/users/{id}(id=${cert.userId})}"
                               th:text="${cert.userNickname}"
                               style="font-weight:600; text-decoration:none; color:var(--text-1);"
                               onmouseover="this.style.textDecoration='underline'"
                               onmouseout="this.style.textDecoration='none'"></a>
                            <div class="cell-secondary" th:text="${cert.userEmail}"></div>
                        </td>
                        <td>
                            <a th:href="@{/admin/certifications/{id}(id=${cert.id})}"
                               th:text="${cert.festivalTitle}"
                               style="font-size:14px; font-weight:600;"></a>
                        </td>
                        <td>
                            <span class="badge"
                                  th:classappend="${cert.pending} ? 'badge-warning' : (${cert.approved} ? 'badge-success' : 'badge-danger')"
                                  th:text="${cert.status.displayName}"></span>
                        </td>
                        <td class="cell-secondary" th:text="${#temporals.format(cert.createdAt, 'MM-dd HH:mm')}"></td>
                        <td>
                            <a th:href="@{/admin/certifications/{id}(id=${cert.id})}"
                               class="btn btn-secondary btn-sm">상세</a>
                        </td>
                    </tr>
                    <tr class="empty-row" th:if="${certifications.totalElements == 0}">
                        <td colspan="6">인증 신청이 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div th:insert="~{admin/fragments :: pagination(${certifications}, '/admin/certifications', 'status=' + ${status})}"></div>
        </div>
    </div>
</div>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
