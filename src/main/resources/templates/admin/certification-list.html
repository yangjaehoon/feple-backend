<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Feple Admin — 인증 관리</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<div th:insert="~{admin/fragments :: navbar('certifications')}"></div>
<div class="main-content">
    <div class="page-header">
        <div>
            <h1 class="page-title">인증 관리</h1>
            <div class="breadcrumb">
                <a th:href="@{/admin}">대시보드</a>
                <span class="bc-sep">›</span>
                <span>인증 관리</span>
            </div>
        </div>
    </div>
    <div class="content-area">

        <div th:if="${successMessage}"
             style="padding:12px 16px; background:#e8f5e9; border:1px solid #a5d6a7; border-radius:8px; color:#2e7d32; margin-bottom:16px;"
             th:text="${successMessage}"></div>

        <div class="card">
            <!-- 필터 탭 -->
            <div style="padding:0 22px; border-bottom:1px solid var(--border); display:flex; gap:4px;">
                <a th:href="@{/admin/certifications(status='', page=0)}"
                   th:style="${status == '' or status == null}
                       ? 'padding:14px 16px; font-size:13.5px; font-weight:600; text-decoration:none; border-bottom:2px solid var(--primary); color:var(--primary);'
                       : 'padding:14px 16px; font-size:13.5px; font-weight:600; text-decoration:none; border-bottom:2px solid transparent; color:var(--muted);'">
                    전체
                    <span class="card-count" th:text="${certifications.totalElements}"></span>
                </a>
                <a th:href="@{/admin/certifications(status='PENDING', page=0)}"
                   th:style="${status == 'PENDING'}
                       ? 'padding:14px 16px; font-size:13.5px; font-weight:600; text-decoration:none; border-bottom:2px solid var(--primary); color:var(--primary);'
                       : 'padding:14px 16px; font-size:13.5px; font-weight:600; text-decoration:none; border-bottom:2px solid transparent; color:var(--muted);'">
                    대기중
                </a>
                <a th:href="@{/admin/certifications(status='APPROVED', page=0)}"
                   th:style="${status == 'APPROVED'}
                       ? 'padding:14px 16px; font-size:13.5px; font-weight:600; text-decoration:none; border-bottom:2px solid var(--primary); color:var(--primary);'
                       : 'padding:14px 16px; font-size:13.5px; font-weight:600; text-decoration:none; border-bottom:2px solid transparent; color:var(--muted);'">
                    승인됨
                </a>
                <a th:href="@{/admin/certifications(status='REJECTED', page=0)}"
                   th:style="${status == 'REJECTED'}
                       ? 'padding:14px 16px; font-size:13.5px; font-weight:600; text-decoration:none; border-bottom:2px solid var(--primary); color:var(--primary);'
                       : 'padding:14px 16px; font-size:13.5px; font-weight:600; text-decoration:none; border-bottom:2px solid transparent; color:var(--muted);'">
                    거절됨
                </a>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th style="width:48px;">ID</th>
                        <th>신청자</th>
                        <th>페스티벌</th>
                        <th style="width:80px;">상태</th>
                        <th style="width:120px;">신청일</th>
                        <th style="width:100px;">액션</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="cert : ${certifications.content}">
                        <td class="td-id" th:text="${cert.id}"></td>
                        <td>
                            <span th:text="${cert.user.nickname}"></span>
                            <div class="cell-secondary" th:text="${cert.user.email}"></div>
                        </td>
                        <td>
                            <a th:href="@{/admin/certifications/{id}(id=${cert.id})}"
                               th:text="${cert.festival.title}"
                               style="font-size:14px; font-weight:600;"></a>
                        </td>
                        <td>
                            <span class="badge"
                                  th:classappend="${cert.status.name() == 'PENDING'} ? 'badge-warning' : (${cert.status.name() == 'APPROVED'} ? 'badge-success' : 'badge-danger')"
                                  th:text="${cert.status.name() == 'PENDING'} ? '대기중' : (${cert.status.name() == 'APPROVED'} ? '승인' : '거절')"></span>
                        </td>
                        <td class="cell-secondary" th:text="${#temporals.format(cert.createdAt, 'MM-dd HH:mm')}"></td>
                        <td>
                            <a th:href="@{/admin/certifications/{id}(id=${cert.id})}"
                               class="btn btn-secondary btn-sm">상세</a>
                        </td>
                    </tr>
                    <tr class="empty-row" th:if="${certifications.totalElements == 0}">
                        <td colspan="6">인증 신청이 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="table-footer">
                <span class="page-info"
                      th:text="'총 ' + ${certifications.totalElements} + '개'"></span>
                <div class="pagination" style="margin-left:auto;">
                    <a th:if="${certifications.hasPrevious()}"
                       th:href="@{/admin/certifications(status=${status}, page=${certifications.number - 1})}">← 이전</a>
                    <span class="page-info"
                          th:text="${certifications.number + 1} + ' / ' + ${certifications.totalPages}"></span>
                    <a th:if="${certifications.hasNext()}"
                       th:href="@{/admin/certifications(status=${status}, page=${certifications.number + 1})}">다음 →</a>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
