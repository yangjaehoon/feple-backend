<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Feple Admin — 아티스트 추가</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<div th:insert="~{admin/fragments :: navbar('festivals')}"></div>
<div class="main-content">
    <div class="page-header">
        <div>
            <h1 class="page-title">아티스트 추가</h1>
            <div class="breadcrumb">
                <a th:href="@{/admin}">대시보드</a>
                <span class="bc-sep">›</span>
                <a th:href="@{/admin/festivals}">페스티벌</a>
                <span class="bc-sep">›</span>
                <a th:href="@{/admin/festivals/{id}(id=${festival.id})}"
                   th:text="${festival.title}"></a>
                <span class="bc-sep">›</span>
                <span>아티스트 추가</span>
            </div>
        </div>
    </div>
    <div class="content-area">
        <div class="card" style="max-width:520px;">
            <div class="card-header">
                <div class="card-title">
                    🎤 아티스트 추가
                    <span style="font-weight:400; color:var(--muted); font-size:13px;"
                          th:text="'— ' + ${festival.title}"></span>
                </div>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/festivals/{id}/artists(id=${festival.id})}"
                      method="post">

                    <div class="form-group">
                        <label>아티스트 검색</label>
                        <input type="text" id="artistSearch" placeholder="이름으로 검색..."
                               oninput="filterArtists(this.value)"
                               style="padding:8px 12px; border:1px solid var(--border); border-radius:8px; width:100%; font-size:13px; margin-bottom:8px;"/>
                        <div style="font-size:12px; color:var(--muted); margin-bottom:6px;">
                            <span id="selectedCount">0</span>명 선택됨
                        </div>
                        <div id="artistList"
                             style="max-height:320px; overflow-y:auto; border:1px solid var(--border); border-radius:8px; padding:4px 0;">
                            <div th:each="artist : ${artists}"
                                 class="artist-item"
                                 th:data-name="${#strings.toLowerCase(artist.name)}">
                                <label style="display:flex; align-items:center; gap:10px; padding:8px 14px; cursor:pointer; font-size:13px; transition:background .15s;"
                                       onmouseover="this.style.background='var(--hover)'" onmouseout="this.style.background=''">
                                    <input type="checkbox" name="artistIds" th:value="${artist.id}"
                                           style="width:15px; height:15px; accent-color:var(--primary); flex-shrink:0;"
                                           onchange="updateCount()"/>
                                    <span th:text="${artist.name} + (${artist.genre} != null ? ' (' + ${artist.genre.displayName} + ')' : '')"></span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">추가하기</button>
                        <a th:href="@{/admin/festivals/{id}(id=${festival.id})}" class="btn btn-secondary">취소</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script th:if="${errorMessage}" th:inline="javascript">
    alert([[${errorMessage}]]);
</script>
<script>
    function filterArtists(query) {
        const q = query.toLowerCase();
        document.querySelectorAll('#artistList .artist-item').forEach(item => {
            item.style.display = item.dataset.name.includes(q) ? '' : 'none';
        });
    }
    function updateCount() {
        const count = document.querySelectorAll('input[name="artistIds"]:checked').length;
        document.getElementById('selectedCount').textContent = count;
    }
</script>
</body>
</html>
