<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Feple Admin — 아티스트 추가</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<div th:insert="~{admin/fragments :: topbar}"></div>
<div th:insert="~{admin/fragments :: sidebar('festivals')}"></div>
<div class="main-content">
    <div class="page-header">
        <div>
            <h1 class="page-title">아티스트 추가</h1>
            <div class="breadcrumb">
                <a th:href="@{/admin}">대시보드</a>
                <span class="bc-sep">›</span>
                <a th:href="@{/admin/festivals}">페스티벌</a>
                <span class="bc-sep">›</span>
                <a th:href="@{/admin/festivals/{id}(id=${festival.id})}"
                   th:text="${festival.title}"></a>
                <span class="bc-sep">›</span>
                <span>아티스트 추가</span>
            </div>
        </div>
    </div>
    <div class="content-area">
        <div th:if="${errorMessage}"
             style="max-width:520px; padding:12px 16px; border-radius:6px; font-size:13.5px; font-weight:500; margin-bottom:20px; background:#FFF5F5; color:#9B2C2C; border:1px solid #FC8181;"
             th:text="${errorMessage}"></div>

        <div class="card" style="max-width:520px;">
            <div class="card-header">
                <div class="card-title">
                    🎤 아티스트 추가
                    <span style="font-weight:400; color:var(--muted); font-size:13px;"
                          th:text="'— ' + ${festival.title}"></span>
                </div>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/festivals/{id}/artists(id=${festival.id})}"
                      th:object="${request}"
                      method="post">

                    <div class="form-grid">
                        <div class="form-group">
                            <label>아티스트</label>
                            <select th:field="*{artistId}" required>
                                <option value="">선택하세요</option>
                                <option th:each="artist : ${artists}"
                                        th:value="${artist.id}"
                                        th:text="${artist.name} + ' (' + (${artist.genre} != null ? ${artist.genre.displayName} : '') + ')'"></option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>라인업 순서</label>
                            <input type="number" th:field="*{lineupOrder}" placeholder="예: 1" min="1"/>
                        </div>

                        <div class="form-group">
                            <label>스테이지</label>
                            <input type="text" th:field="*{stageName}" placeholder="예: 메인 스테이지"/>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">추가하기</button>
                        <a th:href="@{/admin/festivals/{id}(id=${festival.id})}" class="btn btn-secondary">취소</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
