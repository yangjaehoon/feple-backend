<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- ── 역할 변경 + 정지 관리 ── -->
<th:block th:fragment="moderationCards">

    <!-- 역할 변경 -->
    <div class="card">
        <div class="card-header">
            <div class="card-title">🔑 역할 관리</div>
        </div>
        <div class="card-body">
            <form th:action="@{/admin/users/{id}/role(id=${user.id})}" method="post"
                  class="role-form">
                <select name="role" class="form-select select-auto">
                    <option value="USER"   th:selected="${user.regularUser}">일반 사용자</option>
                    <option value="ARTIST" th:selected="${user.artist}">🎤 아티스트</option>
                    <option value="ADMIN"  th:selected="${user.admin}">🛡️ 관리자</option>
                </select>
                <button type="submit" class="btn btn-primary btn-sm"
                        data-confirm="역할을 변경하시겠습니까?">역할 변경</button>
            </form>
        </div>
    </div>

    <!-- 정지 관리 -->
    <div class="card">
        <div class="card-header">
            <div class="card-title">🚫 정지 관리</div>
        </div>
        <div class="card-body">
            <!-- 현재 정지 상태 -->
            <div th:if="${user.banned}" class="ban-box">
                <div class="ban-box-title">현재 정지 상태</div>
                <div class="ban-box-grid">
                    <span>만료</span>
                    <span>
                        <span th:if="${user.permanentBan}">영구 정지</span>
                        <span th:unless="${user.permanentBan}"
                              th:text="${#temporals.format(user.bannedUntil, 'yyyy년 MM월 dd일 HH:mm')}"></span>
                    </span>
                    <span>처리자</span>
                    <span th:text="${user.bannedBy != null ? user.bannedBy : '—'}"></span>
                    <span>사유</span>
                    <span th:text="${user.banReason != null ? user.banReason : '없음'}"
                          class="ban-reason"></span>
                </div>
                <form th:action="@{/admin/users/{id}/unban(id=${user.id})}" method="post"
                      class="form-inline">
                    <button type="submit" class="btn btn-secondary btn-sm"
                            data-confirm="정지를 해제하시겠습니까?">정지 해제</button>
                </form>
            </div>

            <!-- 정지 설정 폼 -->
            <div th:if="${!user.admin}">
                <div class="ban-hint" th:if="${user.banned}">정지 기간을 변경하거나 재정지할 수 있습니다.</div>
                <form th:action="@{/admin/users/{id}/ban(id=${user.id})}" method="post">
                    <div class="ban-form-row">
                        <div>
                            <div class="ban-label">정지 기간</div>
                            <select name="days" class="form-select select-auto">
                                <option value="1">1일</option>
                                <option value="3">3일</option>
                                <option value="7" selected>7일</option>
                                <option value="30">30일</option>
                                <option value="365">365일</option>
                                <option value="0">영구 정지</option>
                            </select>
                        </div>
                        <div class="ban-form-reason">
                            <div class="ban-label">정지 사유 (선택)</div>
                            <textarea name="reason" rows="2"
                                      placeholder="정지 사유를 입력하세요 (선택)"
                                      class="ban-textarea"
                                      maxlength="300"></textarea>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-danger btn-sm"
                            th:text="${user.banned} ? '재정지 (갱신)' : '정지'"
                            data-confirm="이 회원을 정지하시겠습니까?">정지</button>
                </form>
            </div>
            <div th:if="${user.admin}" class="empty-hint">관리자 계정은 정지할 수 없습니다.</div>
        </div>
    </div>

</th:block>

</body>
</html>
