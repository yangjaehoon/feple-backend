<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- ── 팔로우 아티스트 + 좋아요 페스티벌 + 차단 목록 ── -->
<th:block th:fragment="socialCards">

    <!-- 팔로우 아티스트 -->
    <div class="card">
        <div class="card-header">
            <div class="card-title">
                팔로우 아티스트
                <span class="card-count" th:text="${#lists.size(followedArtists)}"></span>
            </div>
        </div>
        <div class="card-body">
            <div th:if="${!#lists.isEmpty(followedArtists)}" class="artist-tag-list">
                <a th:each="artist : ${followedArtists}"
                   th:href="@{/admin/artists/{id}(id=${artist.id})}"
                   class="badge badge-genre badge-link"
                   th:text="${artist.name}"></a>
            </div>
            <div th:if="${#lists.isEmpty(followedArtists)}" class="empty-hint">팔로우한 아티스트가 없습니다.</div>
        </div>
    </div>

    <!-- 좋아요 페스티벌 -->
    <div class="card">
        <div class="card-header">
            <div class="card-title">
                좋아요 페스티벌
                <span class="card-count" th:text="${#lists.size(likedFestivals)}"></span>
            </div>
        </div>
        <div class="card-body">
            <div th:if="${!#lists.isEmpty(likedFestivals)}" class="festival-list">
                <div th:each="festival : ${likedFestivals}" class="festival-item">
                    <a th:href="@{/admin/festivals/{id}(id=${festival.id})}"
                       class="festival-link"
                       th:text="${festival.title}"></a>
                    <span class="festival-date"
                          th:if="${festival.startDate != null}"
                          th:text="${festival.dateRangeDisplay}"></span>
                </div>
            </div>
            <div th:if="${#lists.isEmpty(likedFestivals)}" class="empty-hint">좋아요한 페스티벌이 없습니다.</div>
        </div>
    </div>

    <!-- 차단 목록 -->
    <div class="card">
        <div class="card-header">
            <div class="card-title">🚫 차단한 사용자
                <span class="card-count" th:text="${#lists.size(blockedUsers)}"></span>
            </div>
        </div>
        <div class="card-body">
            <div th:if="${!#lists.isEmpty(blockedUsers)}" class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>사용자 ID</th>
                            <th>닉네임</th>
                            <th>차단 일시</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="blocked : ${blockedUsers}">
                            <td>
                                <a th:href="@{/admin/users/{id}(id=${blocked.userId})}"
                                   th:text="${blocked.userId}" class="td-link-normal"></a>
                            </td>
                            <td th:text="${blocked.nickname}"></td>
                            <td class="td-date" th:text="${#temporals.format(blocked.blockedAt, 'yyyy-MM-dd HH:mm')}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div th:if="${#lists.isEmpty(blockedUsers)}" class="empty-hint">차단한 사용자가 없습니다.</div>
        </div>
    </div>

</th:block>

</body>
</html>
