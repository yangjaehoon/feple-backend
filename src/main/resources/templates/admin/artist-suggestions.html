<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Feple Admin — 아티스트 신청</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<div th:insert="~{admin/fragments :: navbar('artist-suggestions')}"></div>
<div class="main-content">

    <div class="page-header">
        <div>
            <h1 class="page-title">아티스트 신청</h1>
            <div class="breadcrumb">
                <span>Feple Admin</span>
                <span class="bc-sep">›</span>
                <span>아티스트 신청</span>
            </div>
        </div>
    </div>

    <div class="content-area">
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <div class="table-card">
            <table class="data-table">
                <thead>
                <tr>
                    <th>#</th>
                    <th>아티스트 이름</th>
                    <th>추가 정보</th>
                    <th>신청자</th>
                    <th>신청일</th>
                    <th>처리</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="s : ${suggestions}">
                    <td th:text="${s.id}"></td>
                    <td th:text="${s.artistName}"></td>
                    <td th:text="${s.note != null ? s.note : '-'}"></td>
                    <td th:text="${s.userNickname}"></td>
                    <td th:text="${#temporals.format(s.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                    <td>
                        <form th:action="@{/admin/artist-suggestions/{id}/dismiss(id=${s.id})}" method="post">
                            <button type="submit" class="btn btn-secondary btn-sm">처리완료</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(suggestions)}">
                    <td colspan="6" style="text-align:center; color:#999; padding:32px;">
                        대기 중인 아티스트 신청이 없습니다.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
