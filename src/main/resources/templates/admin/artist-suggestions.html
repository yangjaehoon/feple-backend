<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments :: head('아티스트 신청')}"></head>
<body>
<div th:insert="~{admin/fragments :: navbar('artist-suggestions')}"></div>
<div class="main-content">

    <div th:replace="~{admin/fragments :: pageHeader('아티스트 신청', '아티스트 신청')}"></div>

    <div class="content-area">
        <div th:insert="~{admin/fragments :: alerts}"></div>

        <div class="card">
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th style="width:48px;">#</th>
                        <th>아티스트 이름</th>
                        <th>추가 정보</th>
                        <th style="width:110px;">신청자</th>
                        <th style="width:130px;">신청일</th>
                        <th style="width:90px;">처리</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="s : ${suggestions.content}">
                        <td class="td-id" th:text="${s.id}"></td>
                        <td style="font-weight:600;" th:text="${s.artistName}"></td>
                        <td class="cell-secondary" th:text="${s.note != null ? s.note : '—'}"></td>
                        <td th:text="${s.userNickname}"></td>
                        <td class="cell-secondary"
                            th:text="${#temporals.format(s.createdAt, 'yy-MM-dd HH:mm')}"></td>
                        <td>
                            <form th:action="@{/admin/artist-suggestions/{id}/dismiss(id=${s.id})}"
                                  method="post"
                                  onsubmit="return confirm('이 아티스트 신청을 처리 완료하시겠습니까?')">
                                <button type="submit" class="btn btn-secondary btn-sm">처리완료</button>
                            </form>
                        </td>
                    </tr>
                    <tr class="empty-row" th:if="${suggestions.totalElements == 0}">
                        <td colspan="6">대기 중인 아티스트 신청이 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div th:insert="~{admin/fragments :: pagination(${suggestions}, '/admin/artist-suggestions', null)}"></div>
        </div>
    </div>
</div>
</body>
</html>
