<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Feple Admin — 아티스트 사진 관리</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
    <style>
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            padding: 20px;
        }
        .photo-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .photo-card.no-photo {
            border: 2px dashed var(--border);
            opacity: .85;
        }
        .photo-thumb {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
        }
        .photo-placeholder {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: var(--muted);
        }
        .photo-info {
            padding: 10px 12px 4px;
        }
        .photo-name {
            font-weight: 700;
            font-size: 13.5px;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .photo-upload {
            padding: 8px 12px 12px;
        }
        .photo-upload input[type=file] {
            width: 100%;
            font-size: 11px;
            margin-bottom: 6px;
            color: var(--muted);
        }
        .photo-count {
            font-size: 12px;
            color: var(--muted);
            padding: 0 20px 12px;
        }
        .section-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--muted);
            padding: 16px 20px 0;
        }
    </style>
</head>
<body>
<div th:insert="~{admin/fragments :: navbar('artists')}"></div>
<div class="main-content">
    <div class="page-header">
        <div>
            <h1 class="page-title">아티스트 사진 관리</h1>
            <div class="breadcrumb">
                <a th:href="@{/admin}">대시보드</a>
                <span class="bc-sep">›</span>
                <a th:href="@{/admin/artists}">아티스트</a>
                <span class="bc-sep">›</span>
                <span>사진 관리</span>
            </div>
        </div>
        <div class="page-actions">
            <a class="btn btn-secondary" th:href="@{/admin/artists}">← 목록으로</a>
        </div>
    </div>
    <div class="content-area">

        <div th:if="${successMessage}"
             style="padding:12px 16px; background:#e8f5e9; border:1px solid #a5d6a7; border-radius:8px; color:#2e7d32; margin-bottom:16px;"
             th:text="${successMessage}"></div>
        <div th:if="${errorMessage}"
             style="padding:12px 16px; background:#ffebee; border:1px solid #ef9a9a; border-radius:8px; color:#c62828; margin-bottom:16px;"
             th:text="${errorMessage}"></div>

        <!-- 사진 있는 아티스트 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">🖼 사진 등록된 아티스트</div>
                <span class="card-count"
                      th:text="${#lists.size(artists.?[profileImageUrl != null])}"></span>
            </div>

            <div th:if="${#lists.isEmpty(artists.?[profileImageUrl != null])}"
                 style="padding:32px; text-align:center; color:var(--muted); font-size:13px;">
                사진이 등록된 아티스트가 없습니다.
            </div>

            <div class="photo-grid" th:unless="${#lists.isEmpty(artists.?[profileImageUrl != null])}">
                <div th:each="artist : ${artists}"
                     th:if="${artist.profileImageUrl != null}"
                     class="photo-card">
                    <img class="photo-thumb"
                         th:src="${artist.profileImageUrl}"
                         th:alt="${artist.name}"/>
                    <div class="photo-info">
                        <div class="photo-name" th:text="${artist.name}"></div>
                        <span class="badge badge-genre"
                              style="margin-top:4px; display:inline-block;"
                              th:text="${artist.genre}"></span>
                    </div>
                    <form class="photo-upload"
                          th:action="@{/admin/artists/{id}/photo(id=${artist.id})}"
                          method="post"
                          enctype="multipart/form-data">
                        <input type="file" name="profileImageFile" accept="image/*"/>
                        <button type="submit" class="btn btn-primary btn-sm"
                                style="width:100%;">사진 교체</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- 사진 없는 아티스트 -->
        <div class="card" th:unless="${#lists.isEmpty(artists.?[profileImageUrl == null])}">
            <div class="card-header">
                <div class="card-title" style="color:#e53935;">⚠ 사진 미등록 아티스트</div>
                <span class="card-count"
                      th:text="${#lists.size(artists.?[profileImageUrl == null])}"></span>
            </div>

            <div class="photo-grid">
                <div th:each="artist : ${artists}"
                     th:if="${artist.profileImageUrl == null}"
                     class="photo-card no-photo">
                    <div class="photo-placeholder">🎤</div>
                    <div class="photo-info">
                        <div class="photo-name" th:text="${artist.name}"></div>
                        <span class="badge badge-genre"
                              style="margin-top:4px; display:inline-block;"
                              th:text="${artist.genre}"></span>
                    </div>
                    <form class="photo-upload"
                          th:action="@{/admin/artists/{id}/photo(id=${artist.id})}"
                          method="post"
                          enctype="multipart/form-data">
                        <input type="file" name="profileImageFile" accept="image/*"/>
                        <button type="submit" class="btn btn-primary btn-sm"
                                style="width:100%;">사진 등록</button>
                    </form>
                </div>
            </div>
        </div>

    </div>
</div>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
