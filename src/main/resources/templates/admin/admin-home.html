<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Feple 관리자</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/admin}">🎪 Feple Admin</a>
    <div class="navbar-links">
        <a th:href="@{/admin}">홈</a>
        <a th:href="@{/admin/festivals}">페스티벌</a>
        <a th:href="@{/admin/artists}">아티스트</a>
    </div>
</nav>

<div class="container">
    <p class="page-title">관리자 홈</p>

    <!-- 빠른 작업 -->
    <div class="quick-grid">
        <a class="quick-card" th:href="@{/admin/festivals/new}">
            <div class="quick-icon icon-festival">🎵</div>
            <div>
                <div class="quick-label">페스티벌 추가</div>
                <div class="quick-desc">새 페스티벌을 등록합니다</div>
            </div>
        </a>
        <a class="quick-card" th:href="@{/admin/artists/new}">
            <div class="quick-icon icon-artist">🎤</div>
            <div>
                <div class="quick-label">아티스트 추가</div>
                <div class="quick-desc">새 아티스트를 등록합니다</div>
            </div>
        </a>
    </div>

    <!-- 페스티벌 목록 -->
    <div class="card">
        <div class="action-bar">
            <p class="section-title">페스티벌 목록</p>
            <a class="btn btn-primary btn-sm" th:href="@{/admin/festivals/new}" style="margin-left:auto;">+ 등록</a>
        </div>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>제목</th>
                <th>장소</th>
                <th>기간</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="festival : ${festivalPage.content}">
                <td th:text="${festival.id}"></td>
                <td>
                    <a th:href="@{/admin/festivals/{id}(id=${festival.id})}"
                       th:text="${festival.title}"></a>
                </td>
                <td th:text="${festival.location}"></td>
                <td th:text="${festival.startDate} + ' ~ ' + ${festival.endDate}"></td>
            </tr>
            <tr class="empty-row" th:if="${festivalPage.totalElements == 0}">
                <td colspan="4">등록된 페스티벌이 없습니다.</td>
            </tr>
            </tbody>
        </table>

        <div class="pagination">
            <a th:if="${festivalPage.hasPrevious()}"
               th:href="@{/admin(festivalPage=${festivalPage.number - 1}, artistPage=${artistPage.number})}">← 이전</a>
            <span class="page-info"
                  th:text="${festivalPage.number + 1} + ' / ' + ${festivalPage.totalPages}"></span>
            <a th:if="${festivalPage.hasNext()}"
               th:href="@{/admin(festivalPage=${festivalPage.number + 1}, artistPage=${artistPage.number})}">다음 →</a>
        </div>
    </div>

    <!-- 아티스트 목록 -->
    <div class="card">
        <div class="action-bar">
            <p class="section-title">아티스트 목록</p>
            <a class="btn btn-primary btn-sm" th:href="@{/admin/artists/new}" style="margin-left:auto;">+ 등록</a>
        </div>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>이름</th>
                <th>장르</th>
                <th>삭제</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="artist : ${artistPage.content}">
                <td th:text="${artist.id}"></td>
                <td th:text="${artist.name}"></td>
                <td><span class="badge badge-genre" th:text="${artist.genre}"></span></td>
                <td>
                    <form th:action="@{/admin/artists/{id}/delete(id=${artist.id})}"
                          method="post"
                          onsubmit="return confirm('정말 삭제할까요?');">
                        <button type="submit" class="btn btn-danger btn-sm">삭제</button>
                    </form>
                </td>
            </tr>
            <tr class="empty-row" th:if="${artistPage.totalElements == 0}">
                <td colspan="4">등록된 아티스트가 없습니다.</td>
            </tr>
            </tbody>
        </table>

        <div class="pagination">
            <a th:if="${artistPage.hasPrevious()}"
               th:href="@{/admin(festivalPage=${festivalPage.number}, artistPage=${artistPage.number - 1})}">← 이전</a>
            <span class="page-info"
                  th:text="${artistPage.number + 1} + ' / ' + ${artistPage.totalPages}"></span>
            <a th:if="${artistPage.hasNext()}"
               th:href="@{/admin(festivalPage=${festivalPage.number}, artistPage=${artistPage.number + 1})}">다음 →</a>
        </div>
    </div>
</div>

</body>
</html>
