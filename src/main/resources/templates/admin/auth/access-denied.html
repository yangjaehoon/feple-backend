<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head th:replace="~{admin/fragments :: head('접근 권한 없음')}"></head>
<body>
<div th:insert="~{admin/fragments :: navbar('none')}"></div>
<div class="main-content">
    <div class="content-area access-denied-wrap">
        <div class="access-denied-box">
            <div class="access-denied-icon">🔒</div>
            <h2 class="access-denied-title">접근 권한이 없습니다</h2>
            <p class="access-denied-desc">
                이 페이지에 접근하려면 추가 권한이 필요합니다.<br>
                최고 관리자에게 권한 부여를 요청하세요.
            </p>
            <div class="access-denied-perms">
                <div class="access-denied-perms-label">내 권한</div>
                <div class="cell-row" sec:authorize="isAuthenticated()">
                    <span th:each="auth : ${#authentication.authorities}"
                          th:if="${#strings.startsWith(auth.authority, 'PERM_')}"
                          th:text="${auth.authority.replace('PERM_', '')}"
                          class="badge badge-primary"></span>
                    <span sec:authorize="hasRole('SUPER_ADMIN')"
                          class="badge badge-warning">SUPER_ADMIN</span>
                </div>
            </div>
            <a th:href="@{/admin}" class="btn btn-primary">대시보드로 돌아가기</a>
        </div>
    </div>
</div>
</body>
</html>
