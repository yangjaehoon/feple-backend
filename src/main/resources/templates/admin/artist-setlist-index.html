<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Feple Admin — 셋리스트 관리</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<div th:insert="~{admin/fragments :: navbar('artists')}"></div>
<div class="main-content">
    <div class="page-header">
        <div>
            <h1 class="page-title">셋리스트 관리</h1>
            <div class="breadcrumb">
                <a th:href="@{/admin}">대시보드</a>
                <span class="bc-sep">›</span>
                <a th:href="@{/admin/artists}">아티스트</a>
                <span class="bc-sep">›</span>
                <a th:href="@{/admin/artists/{id}/songs(id=${artist.id})}" th:text="${artist.name}"></a>
                <span class="bc-sep">›</span>
                <span>셋리스트</span>
            </div>
        </div>
        <div class="page-actions">
            <a class="btn btn-secondary" th:href="@{/admin/artists/{id}/songs(id=${artist.id})}">← 곡 관리</a>
        </div>
    </div>

    <div class="content-area">
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    페스티벌 출연 목록
                    <span style="font-size:13px; font-weight:400; color:var(--muted); margin-left:6px;"
                          th:text="'— ' + ${artist.name}"></span>
                </div>
            </div>

            <div th:if="${appearances.isEmpty()}"
                 style="padding:32px; text-align:center; color:var(--muted); font-size:13px;">
                등록된 페스티벌 출연 이력이 없습니다.
            </div>

            <div th:unless="${appearances.isEmpty()}" style="padding:0 16px 16px;">
                <div th:each="af, stat : ${appearances}"
                     style="display:flex; align-items:center; gap:12px; padding:14px 0; border-bottom:1px solid var(--border);">
                    <div style="flex:1;">
                        <div style="font-size:14px; font-weight:600;"
                             th:text="${af.festival.title}"></div>
                        <div style="font-size:12px; color:var(--muted); margin-top:3px;"
                             th:text="${af.festival.startDate} + ' ~ ' + ${af.festival.endDate}"></div>
                        <div th:if="${af.stageName != null}"
                             style="font-size:12px; color:var(--muted); margin-top:2px;"
                             th:text="'스테이지: ' + ${af.stageName}"></div>
                    </div>
                    <a th:href="@{/admin/artists/{aId}/setlist/{afId}(aId=${artist.id}, afId=${af.id})}"
                       class="btn btn-primary btn-sm">셋리스트 수정</a>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
