<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Feple Admin — 회원 관리</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<div th:insert="~{admin/fragments :: navbar('users')}"></div>
<div class="main-content">
    <div class="page-header">
        <div>
            <h1 class="page-title">회원 관리</h1>
            <div class="breadcrumb">
                <a th:href="@{/admin}">대시보드</a>
                <span class="bc-sep">›</span>
                <span>회원</span>
            </div>
        </div>
    </div>
    <div class="content-area">

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

        <!-- 일괄 삭제 폼 (테이블 바깥) -->
        <form id="bulk-form" th:action="@{/admin/users/bulk-delete}" method="post"></form>

        <div class="card">
            <!-- 필터 탭 -->
            <div style="padding:0 22px; border-bottom:1px solid var(--border); display:flex; gap:4px;">
                <a th:href="@{/admin/users(page=0,filter='',sort=${sort},keyword=${keyword})}"
                   th:classappend="${filter == '' or filter == null} ? ' active' : ''"
                   class="type-tab">
                    전체
                    <span class="card-count" th:text="${users.totalElements}"></span>
                </a>
                <a th:href="@{/admin/users(page=0,filter='banned',keyword=${keyword})}"
                   th:classappend="${filter == 'banned'} ? ' active' : ''"
                   class="type-tab">정지된 회원</a>
            </div>

            <!-- 검색 + 정렬 바 -->
            <div style="padding:14px 22px; border-bottom:1px solid var(--border); display:flex; flex-wrap:wrap; gap:8px; align-items:center; justify-content:space-between;">
                <form th:action="@{/admin/users}" method="get"
                      style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                    <input type="hidden" name="filter" th:value="${filter}"/>
                    <input type="hidden" name="sort" th:value="${sort}"/>
                    <input type="text" name="keyword" th:value="${keyword}"
                           placeholder="닉네임 또는 이메일 검색..."
                           style="flex:1; min-width:200px; max-width:320px; padding:7px 12px; border:1px solid var(--border); border-radius:7px; font-size:13px;"/>
                    <button type="submit" class="btn btn-secondary btn-sm">검색</button>
                    <a th:if="${keyword != null and !#strings.isEmpty(keyword)}"
                       th:href="@{/admin/users(page=0,filter=${filter},sort=${sort})}"
                       class="btn btn-secondary btn-sm">✕ 초기화</a>
                </form>
                <div th:if="${filter != 'banned'}" style="display:flex; gap:6px; align-items:center;">
                    <span style="font-size:12px; color:var(--muted);">정렬:</span>
                    <a th:href="@{/admin/users(page=0,keyword=${keyword},filter=${filter},sort='latest')}"
                       th:classappend="${sort == 'latest'} ? ' btn-primary' : ' btn-secondary'"
                       class="btn btn-sm">최신순</a>
                    <a th:href="@{/admin/users(page=0,keyword=${keyword},filter=${filter},sort='reports')}"
                       th:classappend="${sort == 'reports'} ? ' btn-primary' : ' btn-secondary'"
                       class="btn btn-sm">신고 많은 순</a>
                </div>
            </div>

            <!-- 일괄 삭제 액션 바 -->
            <div style="padding:10px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px;">
                <button type="submit" form="bulk-form"
                        class="btn btn-danger btn-sm"
                        onclick="return checkBulkSelection() && confirm('선택한 회원을 탈퇴 처리할까요? 게시글과 댓글은 익명(탈퇴한 사용자)으로 유지됩니다.')">
                    선택 삭제
                </button>
                <span id="select-count" style="font-size:12.5px; color:var(--muted);">0명 선택됨</span>
                <a th:href="@{/admin/export/users.csv}" class="btn btn-secondary btn-sm" style="margin-left:auto;">
                    CSV 내보내기
                </a>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th style="width:36px;">
                            <input type="checkbox" id="select-all" title="전체 선택"
                                   style="cursor:pointer; width:15px; height:15px;"/>
                        </th>
                        <th>회원</th>
                        <th style="width:55px; text-align:center;">역할</th>
                        <th style="width:70px; text-align:center;">게시글</th>
                        <th style="width:60px; text-align:center;">댓글</th>
                        <th style="width:70px; text-align:center;">신고</th>
                        <th style="width:100px;">가입일</th>
                        <th style="width:100px;" th:if="${filter == 'banned'}">정지 만료</th>
                        <th style="width:66px;">상세</th>
                        <th style="width:66px;">삭제</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users.content}">
                        <td>
                            <input type="checkbox" name="ids" th:value="${user.id}"
                                   form="bulk-form" class="row-check"
                                   style="cursor:pointer; width:15px; height:15px;"/>
                        </td>
                        <td>
                            <div class="avatar-cell">
                                <img th:if="${user.profileImageUrl != null}"
                                     th:src="${user.profileImageUrl}"
                                     class="avatar" alt="profile"/>
                                <div th:if="${user.profileImageUrl == null}" class="avatar-ph">👤</div>
                                <div>
                                    <div style="display:flex; align-items:center; gap:6px;">
                                        <a th:href="@{/admin/users/{id}(id=${user.id})}"
                                           class="cell-primary" style="color:inherit; text-decoration:none;"
                                           th:text="${user.nickname}"></a>
                                        <span th:if="${user.banned}" class="badge badge-ban">정지</span>
                                    </div>
                                    <div class="cell-secondary" th:text="${user.email}"></div>
                                </div>
                            </div>
                        </td>
                        <!-- 역할 -->
                        <td style="text-align:center;">
                            <span th:if="${user.admin}"  class="badge badge-admin">관리자</span>
                            <span th:if="${user.artist}" class="badge badge-artist">아티스트</span>
                        </td>
                        <!-- 게시글 수 -->
                        <td style="text-align:center; font-size:13px;"
                            th:text="${postCounts.getOrDefault(user.id, 0)}"></td>
                        <!-- 댓글 수 -->
                        <td style="text-align:center; font-size:13px;"
                            th:text="${commentCounts.getOrDefault(user.id, 0)}"></td>
                        <!-- 신고 수 -->
                        <td style="text-align:center;">
                            <th:block th:with="cnt=${reportCounts.get(user.id)}">
                                <span th:if="${cnt != null and cnt > 0}"
                                      th:text="${cnt}"
                                      class="badge"
                                      th:classappend="${cnt >= 5} ? ' badge-report-high' : ' badge-report-low'"></span>
                                <span th:if="${cnt == null or cnt == 0}" class="cell-secondary">0</span>
                            </th:block>
                        </td>
                        <!-- 가입일 -->
                        <td style="color:var(--muted); font-size:12.5px; white-space:nowrap;"
                            th:text="${user.createdAt != null ? #temporals.format(user.createdAt, 'yyyy-MM-dd') : '-'}"></td>
                        <!-- 정지 만료일 (banned 탭에서만 표시) -->
                        <td th:if="${filter == 'banned'}"
                            style="font-size:12px; white-space:nowrap;"
                            th:text="${user.permanentBan ? '영구' : (user.bannedUntil != null ? #temporals.format(user.bannedUntil, 'yyyy-MM-dd') : '-')}"></td>
                        <td>
                            <a th:href="@{/admin/users/{id}(id=${user.id})}"
                               class="btn btn-secondary btn-sm">상세</a>
                        </td>
                        <td>
                            <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post">
                                <input type="hidden" name="page" th:value="${users.number}"/>
                                <button type="submit"
                                        class="btn btn-danger btn-sm"
                                        onclick="return confirm('이 회원을 탈퇴 처리할까요? 게시글과 댓글은 익명(탈퇴한 사용자)으로 유지됩니다.')">탈퇴</button>
                            </form>
                        </td>
                    </tr>
                    <tr class="empty-row" th:if="${users.totalElements == 0}">
                        <td colspan="9">회원이 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div th:insert="~{admin/fragments :: pagination(${users}, '/admin/users', ${extraParams})}"></div>
        </div>
    </div>
</div>
<script>
const selectAll = document.getElementById('select-all');
const countLabel = document.getElementById('select-count');

function updateCount() {
    const checked = document.querySelectorAll('.row-check:checked').length;
    countLabel.textContent = checked + '명 선택됨';
}

function checkBulkSelection() {
    const checked = document.querySelectorAll('.row-check:checked').length;
    if (checked === 0) { alert('삭제할 회원을 선택해주세요.'); return false; }
    return true;
}

if (selectAll) {
    selectAll.addEventListener('change', () => {
        document.querySelectorAll('.row-check').forEach(cb => cb.checked = selectAll.checked);
        updateCount();
    });
}
document.querySelectorAll('.row-check').forEach(cb => cb.addEventListener('change', updateCount));
</script>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
