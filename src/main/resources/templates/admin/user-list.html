<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Feple Admin — 회원 관리</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<div th:insert="~{admin/fragments :: navbar('users')}"></div>
<div class="main-content">
    <div class="page-header">
        <div>
            <h1 class="page-title">회원 관리</h1>
            <div class="breadcrumb">
                <a th:href="@{/admin}">대시보드</a>
                <span class="bc-sep">›</span>
                <span>회원</span>
            </div>
        </div>
    </div>
    <div class="content-area">

        <div th:if="${successMessage}"
             style="padding:12px 16px; background:#e8f5e9; border:1px solid #a5d6a7; border-radius:8px; color:#2e7d32; margin-bottom:16px;"
             th:text="${successMessage}"></div>

        <!-- 일괄 삭제 폼 (테이블 바깥) -->
        <form id="bulk-form" th:action="@{/admin/users/bulk-delete}" method="post"></form>

        <div class="card">
            <!-- 검색 바 -->
            <div style="padding:14px 22px; border-bottom:1px solid var(--border);">
                <form th:action="@{/admin/users}" method="get"
                      style="display:flex; gap:8px; align-items:center;">
                    <input type="text" name="keyword" th:value="${keyword}"
                           placeholder="닉네임 또는 이메일 검색..."
                           style="flex:1; max-width:320px; padding:7px 12px; border:1px solid var(--border); border-radius:7px; font-size:13px;"/>
                    <button type="submit" class="btn btn-secondary btn-sm">검색</button>
                    <a th:if="${keyword != null and !#strings.isEmpty(keyword)}"
                       th:href="@{/admin/users(page=0)}"
                       class="btn btn-secondary btn-sm">✕ 초기화</a>
                </form>
            </div>

            <!-- 일괄 삭제 액션 바 -->
            <div style="padding:10px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px;">
                <button type="submit" form="bulk-form"
                        class="btn btn-danger btn-sm"
                        onclick="return checkBulkSelection() && confirm('선택한 회원을 삭제할까요? 게시글과 댓글도 모두 삭제됩니다.')">
                    선택 삭제
                </button>
                <span id="select-count" style="font-size:12.5px; color:var(--muted);">0명 선택됨</span>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th style="width:36px;">
                            <input type="checkbox" id="select-all" title="전체 선택"
                                   style="cursor:pointer; width:15px; height:15px;"/>
                        </th>
                        <th>회원</th>
                        <th style="width:80px;">상세</th>
                        <th style="width:80px;">삭제</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users.content}">
                        <td>
                            <input type="checkbox" name="ids" th:value="${user.id}"
                                   form="bulk-form" class="row-check"
                                   style="cursor:pointer; width:15px; height:15px;"/>
                        </td>
                        <td>
                            <div class="avatar-cell">
                                <img th:if="${user.profileImageUrl != null}"
                                     th:src="${user.profileImageUrl}"
                                     class="avatar" alt="profile"/>
                                <div th:if="${user.profileImageUrl == null}"
                                     style="width:38px; height:38px; border-radius:50%; background:var(--primary-50); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0;">👤</div>
                                <div>
                                    <div class="cell-primary" th:text="${user.nickname}"></div>
                                    <div class="cell-secondary" th:text="${user.email}"></div>
                                </div>
                            </div>
                        </td>
                        <td>
                            <a th:href="@{/admin/users/{id}(id=${user.id})}"
                               class="btn btn-secondary btn-sm">상세</a>
                        </td>
                        <td>
                            <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post">
                                <input type="hidden" name="page" th:value="${users.number}"/>
                                <button type="submit"
                                        class="btn btn-danger btn-sm"
                                        onclick="return confirm('이 회원을 삭제할까요? 게시글과 댓글도 모두 삭제됩니다.')">삭제</button>
                            </form>
                        </td>
                    </tr>
                    <tr class="empty-row" th:if="${users.totalElements == 0}">
                        <td colspan="4">회원이 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="table-footer">
                <span class="page-info"
                      th:text="'총 ' + ${users.totalElements} + '명'"></span>
                <div class="pagination" style="margin-left:auto;">
                    <a th:if="${users.hasPrevious()}"
                       th:href="@{/admin/users(keyword=${keyword}, page=${users.number - 1})}">← 이전</a>
                    <span class="page-info"
                          th:text="${users.number + 1} + ' / ' + ${users.totalPages}"></span>
                    <a th:if="${users.hasNext()}"
                       th:href="@{/admin/users(keyword=${keyword}, page=${users.number + 1})}">다음 →</a>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
const selectAll = document.getElementById('select-all');
const countLabel = document.getElementById('select-count');

function updateCount() {
    const checked = document.querySelectorAll('.row-check:checked').length;
    countLabel.textContent = checked + '명 선택됨';
}

function checkBulkSelection() {
    const checked = document.querySelectorAll('.row-check:checked').length;
    if (checked === 0) { alert('삭제할 회원을 선택해주세요.'); return false; }
    return true;
}

if (selectAll) {
    selectAll.addEventListener('change', () => {
        document.querySelectorAll('.row-check').forEach(cb => cb.checked = selectAll.checked);
        updateCount();
    });
}
document.querySelectorAll('.row-check').forEach(cb => cb.addEventListener('change', updateCount));
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
