<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Feple Admin — 회원 상세</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<div th:insert="~{admin/fragments :: navbar('users')}"></div>
<div class="main-content">
    <div class="page-header">
        <div>
            <h1 class="page-title" th:text="${user.nickname}">회원 닉네임</h1>
            <div class="breadcrumb">
                <a th:href="@{/admin}">대시보드</a>
                <span class="bc-sep">›</span>
                <a th:href="@{/admin/users}">회원</a>
                <span class="bc-sep">›</span>
                <span>상세</span>
            </div>
        </div>
    </div>
    <div class="content-area">

        <!-- 회원 프로필 카드 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">👤 회원 정보</div>
                <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post">
                    <button type="submit"
                            class="btn btn-danger btn-sm"
                            onclick="return confirm('이 회원을 삭제할까요? 게시글과 댓글도 모두 삭제됩니다.')">삭제</button>
                </form>
            </div>
            <div class="card-body">
                <div style="display:flex; align-items:center; gap:20px; margin-bottom:24px;">
                    <img th:if="${user.profileImageUrl != null}"
                         th:src="${user.profileImageUrl}"
                         style="width:72px; height:72px; border-radius:50%; object-fit:cover; border:2px solid var(--border);"
                         alt="profile"/>
                    <div th:if="${user.profileImageUrl == null}"
                         style="width:72px; height:72px; border-radius:50%; background:var(--primary-50); display:flex; align-items:center; justify-content:center; font-size:32px; flex-shrink:0;">👤</div>
                    <div>
                        <div style="display:flex; align-items:center; gap:8px;">
                            <div style="font-size:20px; font-weight:700; color:var(--text);"
                                 th:text="${user.nickname}"></div>
                            <span th:if="${user.role != null and user.role.name() == 'ADMIN'}"
                                  class="badge badge-danger" style="font-size:11px;">🛡️ 관리자</span>
                            <span th:if="${user.role != null and user.role.name() == 'ARTIST'}"
                                  class="badge badge-primary" style="font-size:11px;">🎤 아티스트</span>
                        </div>
                        <div style="font-size:13px; color:var(--muted); margin-top:4px;"
                             th:text="${user.email}"></div>
                        <div style="font-size:12px; color:var(--muted); margin-top:2px;">
                            ID: <span th:text="${user.id}"></span>
                        </div>
                        <div style="font-size:12px; color:var(--muted); margin-top:2px;"
                             th:if="${user.createdAt != null}">
                            가입일: <span th:text="${#temporals.format(user.createdAt, 'yyyy년 MM월 dd일 HH:mm')}"></span>
                        </div>
                    </div>
                </div>

                <!-- 통계 -->
                <div style="display:flex; gap:24px; padding-top:16px; border-top:1px solid var(--border);">
                    <div style="text-align:center;">
                        <div style="font-size:22px; font-weight:800; color:var(--primary);"
                             th:text="${stats.postCount}">0</div>
                        <div style="font-size:12px; color:var(--muted); margin-top:2px;">게시글</div>
                    </div>
                    <div style="text-align:center;">
                        <div style="font-size:22px; font-weight:800; color:var(--primary);"
                             th:text="${stats.commentCount}">0</div>
                        <div style="font-size:12px; color:var(--muted); margin-top:2px;">댓글</div>
                    </div>
                    <div style="text-align:center;">
                        <div style="font-size:22px; font-weight:800; color:var(--primary);"
                             th:text="${#lists.size(likedFestivals)}">0</div>
                        <div style="font-size:12px; color:var(--muted); margin-top:2px;">페스티벌 좋아요</div>
                    </div>
                    <div style="text-align:center;">
                        <div style="font-size:22px; font-weight:800; color:var(--primary);"
                             th:text="${#lists.size(followedArtists)}">0</div>
                        <div style="font-size:12px; color:var(--muted); margin-top:2px;">팔로우 아티스트</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 최근 게시글 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    📝 최근 게시글
                    <span class="card-count" th:text="${#lists.size(recentPosts)}"></span>
                </div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>제목</th>
                        <th>게시판</th>
                        <th>좋아요</th>
                        <th>작성일</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="post : ${recentPosts}">
                        <td class="td-id" th:text="${post.id}"></td>
                        <td>
                            <a th:href="@{/admin/posts/{id}(id=${post.id})}"
                               th:text="${post.title}"
                               style="max-width:360px; display:inline-block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></a>
                        </td>
                        <td>
                            <span class="badge"
                                  th:classappend="${post.boardType != null} ? 'badge-primary' : 'badge-genre'"
                                  th:text="${post.boardDisplayName}"></span>
                        </td>
                        <td style="color:var(--muted);" th:text="${post.likeCount}"></td>
                        <td style="color:var(--muted); white-space:nowrap; font-size:12.5px;"
                            th:text="${#temporals.format(post.createdAt, 'MM-dd HH:mm')}"></td>
                    </tr>
                    <tr class="empty-row" th:if="${#lists.isEmpty(recentPosts)}">
                        <td colspan="5">게시글이 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 팔로우 아티스트 -->
        <div class="card" th:if="${!#lists.isEmpty(followedArtists)}">
            <div class="card-header">
                <div class="card-title">
                    🎤 팔로우 아티스트
                    <span class="card-count" th:text="${#lists.size(followedArtists)}"></span>
                </div>
            </div>
            <div class="card-body">
                <div style="display:flex; flex-wrap:wrap; gap:8px;">
                    <span th:each="artist : ${followedArtists}"
                          class="badge badge-genre"
                          th:text="${artist.name}"></span>
                </div>
            </div>
        </div>

        <!-- 좋아요 페스티벌 -->
        <div class="card" th:if="${!#lists.isEmpty(likedFestivals)}">
            <div class="card-header">
                <div class="card-title">
                    🎵 좋아요 페스티벌
                    <span class="card-count" th:text="${#lists.size(likedFestivals)}"></span>
                </div>
            </div>
            <div class="card-body">
                <div style="display:flex; flex-direction:column; gap:8px;">
                    <div th:each="festival : ${likedFestivals}"
                         style="display:flex; align-items:center; gap:10px; padding:8px 12px; background:var(--bg); border-radius:8px; border:1px solid var(--border);">
                        <span style="font-size:16px;">🎵</span>
                        <span style="font-weight:600; font-size:13.5px;" th:text="${festival.title}"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 역할 변경 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">🔑 역할 관리</div>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/users/{id}/role(id=${user.id})}" method="post"
                      style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
                    <select name="role" class="form-select" style="width:auto;">
                        <option value="USER"   th:selected="${user.role != null and user.role.name() == 'USER'}">일반 사용자</option>
                        <option value="ARTIST" th:selected="${user.role != null and user.role.name() == 'ARTIST'}">🎤 아티스트</option>
                        <option value="ADMIN"  th:selected="${user.role != null and user.role.name() == 'ADMIN'}">🛡️ 관리자</option>
                    </select>
                    <button type="submit" class="btn btn-primary btn-sm">역할 변경</button>
                </form>
            </div>
        </div>

        <div style="margin-top:8px;">
            <a th:href="@{/admin/users}" class="btn btn-secondary">← 목록으로</a>
        </div>

    </div>
</div>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
