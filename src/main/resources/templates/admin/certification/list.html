<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments :: head('인증 관리')}"></head>
<body>
<div th:insert="~{admin/fragments :: navbar('certifications')}"></div>
<div class="main-content">
    <div th:replace="~{admin/fragments :: pageHeader('인증 관리', '인증 관리')}"></div>
    <div class="content-area">

        <div th:insert="~{admin/fragments :: alerts}"></div>

        <!-- 일괄 처리 툴바 (PENDING 탭에서만 표시) -->
        <div th:if="${status == 'PENDING' or (status == '' or status == null)}" id="bulkToolbar" class="bulk-toolbar" style="display:none;">
            <span id="bulkCount" class="bulk-count">0건 선택됨</span>
            <form id="formBulkApprove" th:action="@{/admin/certifications/bulk-approve}" method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="status" th:value="${status}"/>
                <input type="hidden" name="page" th:value="${page}"/>
                <input type="hidden" name="keyword" th:value="${keyword}"/>
                <div id="approveIds"></div>
                <button type="submit" class="btn btn-success btn-sm">일괄 승인</button>
            </form>
            <form id="formBulkReject" th:action="@{/admin/certifications/bulk-reject}" method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="status" th:value="${status}"/>
                <input type="hidden" name="page" th:value="${page}"/>
                <input type="hidden" name="keyword" th:value="${keyword}"/>
                <div id="rejectIds"></div>
                <input type="text" name="rejectionMessage" placeholder="거절 사유 (선택)" class="form-control form-control-sm" style="width:200px; display:inline-block;"/>
                <button type="submit" class="btn btn-danger btn-sm">일괄 거절</button>
            </form>
        </div>

        <div class="card">
            <!-- 검색 바 -->
            <div class="search-bar">
                <form th:action="@{/admin/certifications}" method="get">
                    <input type="hidden" name="status" th:value="${status}"/>
                    <th:block th:replace="~{admin/fragments :: searchInputs(${keyword}, '신청자 닉네임 또는 페스티벌명 검색...', @{/admin/certifications(status=${status})})}"></th:block>
                </form>
            </div>

            <!-- 필터 탭 -->
            <div class="type-tab-wrap">
                <a th:href="@{/admin/certifications(status='', page=0)}"
                   th:classappend="${status == '' or status == null} ? ' active' : ''"
                   class="type-tab">
                    전체
                    <span class="card-count" th:text="${certifications.totalElements}"></span>
                </a>
                <a th:href="@{/admin/certifications(status='PENDING', page=0)}"
                   th:classappend="${status == 'PENDING'} ? ' active' : ''"
                   class="type-tab">
                    대기중
                    <span th:if="${pendingCount > 0}" class="card-count" th:text="${pendingCount}"></span>
                </a>
                <a th:href="@{/admin/certifications(status='APPROVED', page=0)}"
                   th:classappend="${status == 'APPROVED'} ? ' active' : ''"
                   class="type-tab">승인됨</a>
                <a th:href="@{/admin/certifications(status='REJECTED', page=0)}"
                   th:classappend="${status == 'REJECTED'} ? ' active' : ''"
                   class="type-tab">거절됨</a>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th class="col-w36">
                            <input type="checkbox" id="checkAll" title="전체 선택" onchange="toggleAll(this)"/>
                        </th>
                        <th class="col-w48">ID</th>
                        <th>신청자</th>
                        <th>페스티벌</th>
                        <th class="col-w80">상태</th>
                        <th class="col-w80">별점</th>
                        <th class="col-w120">신청일</th>
                        <th class="col-w100">액션</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="cert : ${certifications.content}">
                        <td>
                            <input th:if="${cert.pending}" type="checkbox" class="cert-check"
                                   th:value="${cert.id}" onchange="updateBulkToolbar()"/>
                            <span th:unless="${cert.pending}"></span>
                        </td>
                        <td class="td-id" th:text="${cert.id}"></td>
                        <td>
                            <a th:href="@{/admin/users/{id}(id=${cert.userId})}"
                               th:text="${cert.userNickname}"
                               class="td-link"></a>
                            <div class="cell-secondary" th:text="${cert.userEmail}"></div>
                        </td>
                        <td>
                            <a th:href="@{/admin/certifications/{id}(id=${cert.id}, status=${status}, page=${page}, keyword=${keyword})}"
                               th:text="${cert.festivalTitle}"
                               class="cell-primary cell-link"></a>
                        </td>
                        <td>
                            <span class="badge"
                                  th:classappend="${cert.pending} ? 'badge-warning' : (${cert.approved} ? 'badge-success' : 'badge-danger')"
                                  th:text="${cert.status.displayName}"></span>
                        </td>
                        <td>
                            <span th:if="${cert.approved and cert.rating != null}">
                                <span th:each="i : ${#numbers.sequence(1,5)}"
                                      th:text="${i <= cert.rating} ? '★' : '☆'"
                                      th:class="${i <= cert.rating} ? 'star-active' : 'star-empty'"
                                      th:attr="aria-hidden='true'"></span>
                                <span class="sr-only" th:text="${cert.rating} + '점'"></span>
                            </span>
                            <span th:if="${cert.approved and cert.rating == null}"
                                  class="cell-secondary">-</span>
                            <span th:unless="${cert.approved}" class="cell-secondary">-</span>
                        </td>
                        <td class="cell-secondary" th:text="${#temporals.format(cert.createdAt, 'MM-dd HH:mm')}"></td>
                        <td>
                            <a th:href="@{/admin/certifications/{id}(id=${cert.id}, status=${status}, page=${page}, keyword=${keyword})}"
                               class="btn btn-secondary btn-sm">상세</a>
                        </td>
                    </tr>
                    <tr th:if="${certifications.totalElements == 0}" th:replace="~{admin/fragments :: emptyRow(8, '인증 신청이 없습니다.')}"></tr>
                    </tbody>
                </table>
            </div>

            <div th:insert="~{admin/fragments :: pagination(${certifications}, '/admin/certifications',
                'status=' + ${status} + (${keyword != null and !#strings.isEmpty(keyword)} ? '&keyword=' + ${keyword} : ''))}"></div>
        </div>
    </div>
</div>

<script>
    function toggleAll(master) {
        document.querySelectorAll('.cert-check').forEach(cb => cb.checked = master.checked);
        updateBulkToolbar();
    }

    function updateBulkToolbar() {
        const checked = [...document.querySelectorAll('.cert-check:checked')];
        const toolbar = document.getElementById('bulkToolbar');
        if (!toolbar) return;

        toolbar.style.display = checked.length > 0 ? 'flex' : 'none';
        document.getElementById('bulkCount').textContent = checked.length + '건 선택됨';

        const ids = checked.map(cb => cb.value);
        syncIds('approveIds', ids);
        syncIds('rejectIds', ids);
    }

    function syncIds(containerId, ids) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        ids.forEach(id => {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'ids';
            input.value = id;
            container.appendChild(input);
        });
    }
</script>
</body>
</html>
