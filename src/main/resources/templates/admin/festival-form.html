<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>페스티벌 등록</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/admin}">🎪 Feple Admin</a>
    <div class="navbar-links">
        <a th:href="@{/admin}">홈</a>
        <a th:href="@{/admin/festivals}">페스티벌</a>
        <a th:href="@{/admin/artists}">아티스트</a>
    </div>
</nav>

<div class="container">
    <p class="page-title">페스티벌 등록</p>

    <div th:if="${param.success}" class="alert-success">등록이 완료되었습니다.</div>

    <div class="card">
        <form th:action="@{/admin/festivals/new}"
              th:object="${festival}"
              method="post"
              enctype="multipart/form-data">

            <div class="form-grid">
                <div class="form-group">
                    <label>제목</label>
                    <input type="text" th:field="*{title}" placeholder="페스티벌 제목" required/>
                </div>

                <div class="form-group">
                    <label>설명</label>
                    <textarea th:field="*{description}" placeholder="페스티벌 설명을 입력하세요"></textarea>
                </div>

                <div class="form-group">
                    <label>장소</label>
                    <input type="text" th:field="*{location}" placeholder="행사 장소" required/>
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                    <div class="form-group">
                        <label>시작일</label>
                        <input type="date" th:field="*{startDate}" required/>
                    </div>
                    <div class="form-group">
                        <label>종료일</label>
                        <input type="date" th:field="*{endDate}" required/>
                    </div>
                </div>

                <div class="form-group">
                    <label>포스터 이미지</label>
                    <input type="file" name="posterFile" accept="image/*"/>
                </div>
            </div>

            <div class="actions" style="margin-top:28px;">
                <button type="submit" class="btn btn-primary">등록</button>
                <a th:href="@{/admin/festivals}" class="btn btn-secondary">취소</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
