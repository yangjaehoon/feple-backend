<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Feple Admin — 페스티벌 등록</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<div th:insert="~{admin/fragments :: topbar}"></div>
<div th:insert="~{admin/fragments :: sidebar('festivals')}"></div>
<div class="main-content">
    <div class="page-header">
        <div>
            <h1 class="page-title">페스티벌 등록</h1>
            <div class="breadcrumb">
                <a th:href="@{/admin}">대시보드</a>
                <span class="bc-sep">›</span>
                <a th:href="@{/admin/festivals}">페스티벌</a>
                <span class="bc-sep">›</span>
                <span>등록</span>
            </div>
        </div>
    </div>
    <div class="content-area">

        <div th:if="${param.success}" class="alert alert-success">✓ 등록이 완료되었습니다.</div>

        <div class="card" style="max-width:640px;">
            <div class="card-header">
                <div class="card-title">🎵 새 페스티벌</div>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/festivals/new}"
                      th:object="${festival}"
                      method="post"
                      enctype="multipart/form-data">

                    <div class="form-grid">
                        <div class="form-group">
                            <label>제목</label>
                            <input type="text" th:field="*{title}" placeholder="페스티벌 제목" required/>
                        </div>

                        <div class="form-group">
                            <label>설명</label>
                            <textarea th:field="*{description}" placeholder="페스티벌 설명을 입력하세요"></textarea>
                        </div>

                        <div class="form-group">
                            <label>장소</label>
                            <input type="text" th:field="*{location}" placeholder="행사 장소" required/>
                        </div>

                        <div class="form-row-2">
                            <div class="form-group">
                                <label>시작일</label>
                                <input type="date" th:field="*{startDate}" required/>
                            </div>
                            <div class="form-group">
                                <label>종료일</label>
                                <input type="date" th:field="*{endDate}" required/>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>포스터 이미지</label>
                            <input type="file" name="posterFile" accept="image/*"/>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">등록하기</button>
                        <a th:href="@{/admin/festivals}" class="btn btn-secondary">취소</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
