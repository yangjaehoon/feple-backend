<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Feple Admin — 신고 관리</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
    <style>
        .reason-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:700; white-space:nowrap; }
        .reason-SPAM          { background:#fff3cd; color:#856404; }
        .reason-ABUSE         { background:#f8d7da; color:#842029; }
        .reason-OBSCENE       { background:#f5c6cb; color:#721c24; }
        .reason-MISINFORMATION{ background:#d1ecf1; color:#0c5460; }
        .reason-OTHER         { background:#e2e3e5; color:#383d41; }
        .status-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:700; white-space:nowrap; }
        .status-PENDING      { background:#fff3cd; color:#856404; }
        .status-POST_DELETED { background:#d4edda; color:#155724; }
        .status-DISMISSED    { background:#e2e3e5; color:#383d41; }
        .type-tab-wrap { display:flex; gap:0; border-bottom:1px solid var(--border); padding:0 22px; }
        .status-tab { padding:14px 16px; font-size:13.5px; font-weight:600; text-decoration:none; border-bottom:2px solid transparent; color:var(--muted); }
        .status-tab.active { border-bottom-color:var(--primary); color:var(--primary); }
        .report-count-badge { display:inline-block; padding:1px 7px; border-radius:10px; font-size:11px; font-weight:700; margin-left:5px; vertical-align:middle; }
        .report-count-low  { background:#fff3cd; color:#856404; }
        .report-count-high { background:#f8d7da; color:#842029; }
        .report-detail { margin-top:4px; font-size:12px; color:var(--text-2); background:var(--border); border-radius:4px; padding:2px 8px; display:inline-block; max-width:100%; }
        .bulk-toolbar { padding:10px 22px; background:var(--bg-2); border-bottom:1px solid var(--border); display:none; align-items:center; gap:12px; }
        .bulk-toolbar.visible { display:flex; }
        .bulk-count { font-size:13px; font-weight:600; color:var(--text-1); }
    </style>
</head>
<body>
<div th:insert="~{admin/fragments :: navbar('reports')}"></div>
<div class="main-content">
    <div class="page-header">
        <div>
            <h1 class="page-title">신고 관리</h1>
            <div class="breadcrumb">
                <a th:href="@{/admin}">대시보드</a>
                <span class="bc-sep">›</span>
                <span>신고</span>
            </div>
        </div>
    </div>
    <div class="content-area">

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

        <div class="card">
            <!-- 유형 탭 -->
            <div class="type-tab-wrap">
                <a th:href="@{/admin/reports(type='post', status=${status}, page=0)}"
                   th:classappend="${type == 'post'} ? ' active' : ''"
                   class="type-tab">
                    게시글 신고
                    <span th:if="${postPendingCount > 0}" class="card-count" th:text="${postPendingCount}"></span>
                </a>
                <a th:href="@{/admin/reports(type='comment', status=${status}, page=0)}"
                   th:classappend="${type == 'comment'} ? ' active' : ''"
                   class="type-tab">
                    댓글 신고
                    <span th:if="${commentPendingCount > 0}" class="card-count" th:text="${commentPendingCount}"></span>
                </a>
                <a th:href="@{/admin/reports(type='photo', status=${status}, page=0)}"
                   th:classappend="${type == 'photo'} ? ' active' : ''"
                   class="type-tab">
                    사진 신고
                    <span th:if="${photoPendingCount > 0}" class="card-count" th:text="${photoPendingCount}"></span>
                </a>
            </div>

            <!-- 상태 탭 + CSV 내보내기 -->
            <div style="padding:0 22px; border-bottom:1px solid var(--border); display:flex; gap:4px; align-items:center;">
                <a th:href="@{/admin/reports(type=${type}, status='PENDING', page=0)}"
                   th:classappend="${status == 'PENDING'} ? ' active'"
                   class="status-tab">
                    대기 중
                    <span class="card-count" th:text="${pendingCount}"></span>
                </a>
                <a th:href="@{/admin/reports(type=${type}, status='ALL', page=0)}"
                   th:classappend="${status == 'ALL'} ? ' active'"
                   class="status-tab">
                    전체
                    <span class="card-count" th:text="${totalCount}"></span>
                </a>
                <a th:if="${type == 'post' or type == 'comment'}"
                   th:href="@{/admin/export/reports.csv(type=${type})}"
                   class="btn btn-secondary btn-sm" style="margin-left:auto; margin-right:0;">
                    CSV 내보내기
                </a>
            </div>

            <!-- 게시글 신고 테이블 -->
            <div th:if="${type == 'post'}">
                <form id="bulk-form" th:action="@{/admin/reports/bulk-dismiss}" method="post" style="display:none;">
                    <input type="hidden" name="type" value="post"/>
                    <input type="hidden" name="page" th:value="${reports.number}"/>
                    <input type="hidden" name="status" th:value="${status}"/>
                </form>
                <div class="bulk-toolbar" id="bulk-toolbar">
                    <span class="bulk-count" id="bulk-count">0건 선택됨</span>
                    <button type="button" class="btn btn-secondary btn-sm"
                            onclick="submitBulk('/admin/reports/bulk-dismiss', '선택한 {n}건을 모두 기각할까요?')">일괄 기각</button>
                    <button type="button" class="btn btn-danger btn-sm"
                            onclick="submitBulk('/admin/reports/bulk-delete-post', '선택한 {n}건의 게시글을 삭제할까요? 이 작업은 되돌릴 수 없습니다.')">일괄 글 삭제</button>
                </div>
                <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th style="width:36px;"><input type="checkbox" id="chk-all" onchange="toggleAll(this)"/></th>
                        <th style="width:52px;">ID</th>
                        <th>신고된 게시글</th>
                        <th style="width:90px;">신고 사유</th>
                        <th style="width:100px;">신고자</th>
                        <th style="width:90px;">일시</th>
                        <th style="width:70px;">상태</th>
                        <th style="width:200px;">처리</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="report : ${reports.content}">
                        <td><input th:if="${report.pending}" type="checkbox" class="row-chk" th:value="${report.id}" onchange="updateToolbar()"/></td>
                        <td class="td-id" th:text="${report.id}"></td>
                        <td>
                            <a th:href="@{/admin/posts/{id}(id=${report.postId})}"
                               th:text="${report.postTitle}"
                               style="font-size:14px; font-weight:600; max-width:300px; display:inline-block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></a>
                            <div class="cell-secondary" style="margin-top:4px;">
                                <a th:href="@{/admin/users/{id}(id=${report.postAuthorId})}"
                                   th:text="${report.posterNickname}"
                                   style="color:var(--text-2); text-decoration:none;"
                                   onmouseover="this.style.textDecoration='underline'"
                                   onmouseout="this.style.textDecoration='none'"></a>
                                <span th:with="cnt=${authorReportCounts.get(report.postAuthorId)}"
                                      th:if="${cnt != null}"
                                      th:classappend="${cnt >= 5} ? 'report-count-high' : 'report-count-low'"
                                      class="report-count-badge"
                                      th:text="'누적 신고 ' + ${cnt} + '건'"></span>
                            </div>
                            <div th:if="${report.detail != null and !#strings.isEmpty(report.detail)}"
                                 class="report-detail"
                                 th:text="${report.detail}"></div>
                        </td>
                        <td>
                            <span class="reason-badge"
                                  th:classappend="'reason-' + ${report.reason}"
                                  th:text="${report.reason.displayName}">
                            </span>
                        </td>
                        <td class="cell-secondary" th:text="${report.reporter.nickname}"></td>
                        <td class="cell-secondary"
                            th:text="${#temporals.format(report.createdAt, 'MM-dd HH:mm')}"></td>
                        <td>
                            <span class="status-badge"
                                  th:classappend="'status-' + ${report.status}"
                                  th:text="${report.status.displayName}">
                            </span>
                        </td>
                        <td>
                            <div th:if="${report.pending}"
                                 style="display:flex; gap:6px;">
                                <form th:action="@{/admin/reports/{id}/delete-post(id=${report.id})}" method="post">
                                    <input type="hidden" name="page" th:value="${reports.number}"/>
                                    <button type="submit" class="btn btn-danger btn-sm"
                                            onclick="return confirm('게시글을 삭제하고 신고를 처리할까요?')">
                                        글 삭제
                                    </button>
                                </form>
                                <form th:action="@{/admin/reports/{id}/dismiss(id=${report.id})}" method="post">
                                    <input type="hidden" name="page" th:value="${reports.number}"/>
                                    <button type="submit" class="btn btn-secondary btn-sm"
                                            onclick="return confirm('이 신고를 기각할까요?')">
                                        기각
                                    </button>
                                </form>
                            </div>
                            <span th:unless="${report.pending}"
                                  style="color:var(--muted); font-size:12px;">처리 완료</span>
                        </td>
                    </tr>
                    <tr class="empty-row" th:if="${reports.totalElements == 0}">
                        <td colspan="8">신고 내역이 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
                </div>
            </div>

            <!-- 댓글 신고 테이블 -->
            <div th:if="${type == 'comment'}">
                <form id="bulk-form" th:action="@{/admin/reports/bulk-dismiss}" method="post" style="display:none;">
                    <input type="hidden" name="type" value="comment"/>
                    <input type="hidden" name="page" th:value="${reports.number}"/>
                    <input type="hidden" name="status" th:value="${status}"/>
                </form>
                <div class="bulk-toolbar" id="bulk-toolbar">
                    <span class="bulk-count" id="bulk-count">0건 선택됨</span>
                    <button type="button" class="btn btn-secondary btn-sm"
                            onclick="submitBulk('/admin/reports/bulk-dismiss', '선택한 {n}건을 모두 기각할까요?')">일괄 기각</button>
                    <button type="button" class="btn btn-danger btn-sm"
                            onclick="submitBulk('/admin/reports/bulk-delete-comment', '선택한 {n}건의 댓글을 삭제할까요? 이 작업은 되돌릴 수 없습니다.')">일괄 댓글 삭제</button>
                </div>
                <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th style="width:36px;"><input type="checkbox" id="chk-all" onchange="toggleAll(this)"/></th>
                        <th style="width:52px;">ID</th>
                        <th>신고된 댓글</th>
                        <th style="width:90px;">신고 사유</th>
                        <th style="width:100px;">신고자</th>
                        <th style="width:90px;">일시</th>
                        <th style="width:70px;">상태</th>
                        <th style="width:200px;">처리</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="report : ${reports.content}">
                        <td><input th:if="${report.pending}" type="checkbox" class="row-chk" th:value="${report.id}" onchange="updateToolbar()"/></td>
                        <td class="td-id" th:text="${report.id}"></td>
                        <td>
                            <div style="font-size:14px; font-weight:600; max-width:300px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"
                                 th:text="${report.commentContent}"></div>
                            <div class="cell-secondary" style="margin-top:4px;">
                                <a th:href="@{/admin/users/{id}(id=${report.commentAuthorId})}"
                                   th:text="${report.commentUserNickname}"
                                   style="color:var(--text-2); text-decoration:none;"
                                   onmouseover="this.style.textDecoration='underline'"
                                   onmouseout="this.style.textDecoration='none'"></a>
                                <span th:with="cnt=${authorReportCounts.get(report.commentAuthorId)}"
                                      th:if="${cnt != null}"
                                      th:classappend="${cnt >= 5} ? 'report-count-high' : 'report-count-low'"
                                      class="report-count-badge"
                                      th:text="'누적 신고 ' + ${cnt} + '건'"></span>
                                <span style="margin-left:6px;">•</span>
                                <a th:href="@{/admin/posts/{id}(id=${report.commentPostId})}"
                                   th:text="${report.commentPostTitle}"
                                   style="margin-left:6px; color:var(--muted);"></a>
                            </div>
                            <div th:if="${report.detail != null and !#strings.isEmpty(report.detail)}"
                                 class="report-detail"
                                 th:text="${report.detail}"></div>
                        </td>
                        <td>
                            <span class="reason-badge"
                                  th:classappend="'reason-' + ${report.reason}"
                                  th:text="${report.reason.displayName}">
                            </span>
                        </td>
                        <td class="cell-secondary" th:text="${report.reporter.nickname}"></td>
                        <td class="cell-secondary"
                            th:text="${#temporals.format(report.createdAt, 'MM-dd HH:mm')}"></td>
                        <td>
                            <span class="status-badge"
                                  th:classappend="'status-' + ${report.status}"
                                  th:text="${report.status.displayName}">
                            </span>
                        </td>
                        <td>
                            <div th:if="${report.pending}"
                                 style="display:flex; gap:6px;">
                                <form th:action="@{/admin/reports/comments/{id}/delete-comment(id=${report.id})}" method="post">
                                    <input type="hidden" name="page" th:value="${reports.number}"/>
                                    <button type="submit" class="btn btn-danger btn-sm"
                                            onclick="return confirm('댓글을 삭제하고 신고를 처리할까요?')">
                                        댓글 삭제
                                    </button>
                                </form>
                                <form th:action="@{/admin/reports/{id}/dismiss(id=${report.id})}" method="post">
                                    <input type="hidden" name="type" value="comment"/>
                                    <input type="hidden" name="page" th:value="${reports.number}"/>
                                    <button type="submit" class="btn btn-secondary btn-sm"
                                            onclick="return confirm('이 신고를 기각할까요?')">
                                        기각
                                    </button>
                                </form>
                            </div>
                            <span th:unless="${report.pending}"
                                  style="color:var(--muted); font-size:12px;">처리 완료</span>
                        </td>
                    </tr>
                    <tr class="empty-row" th:if="${reports.totalElements == 0}">
                        <td colspan="8">신고 내역이 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
                </div>
            </div>
            </div>

            <!-- 사진 신고 테이블 -->
            <div th:if="${type == 'photo'}">
                <form id="bulk-form" th:action="@{/admin/reports/bulk-dismiss}" method="post" style="display:none;">
                    <input type="hidden" name="type" value="photo"/>
                    <input type="hidden" name="page" th:value="${reports.number}"/>
                    <input type="hidden" name="status" th:value="${status}"/>
                </form>
                <div class="bulk-toolbar" id="bulk-toolbar">
                    <span class="bulk-count" id="bulk-count">0건 선택됨</span>
                    <button type="button" class="btn btn-secondary btn-sm"
                            onclick="submitBulk('/admin/reports/bulk-dismiss', '선택한 {n}건을 모두 기각할까요?')">일괄 기각</button>
                    <button type="button" class="btn btn-danger btn-sm"
                            onclick="submitBulk('/admin/reports/bulk-delete-photo', '선택한 {n}건의 사진을 삭제할까요? 이 작업은 되돌릴 수 없습니다.')">일괄 사진 삭제</button>
                </div>
                <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th style="width:36px;"><input type="checkbox" id="chk-all" onchange="toggleAll(this)"/></th>
                        <th style="width:52px;">ID</th>
                        <th>신고된 사진</th>
                        <th style="width:90px;">신고 사유</th>
                        <th style="width:100px;">신고자</th>
                        <th style="width:90px;">일시</th>
                        <th style="width:70px;">상태</th>
                        <th style="width:200px;">처리</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="report : ${reports.content}">
                        <td><input th:if="${report.pending}" type="checkbox" class="row-chk" th:value="${report.id}" onchange="updateToolbar()"/></td>
                        <td class="td-id" th:text="${report.id}"></td>
                        <td>
                            <div style="font-size:14px; font-weight:600;">
                                사진 #<span th:text="${report.photo.id}"></span>
                                <span style="font-size:12px; font-weight:400; color:var(--muted); margin-left:6px;"
                                      th:text="${report.photo.title}"></span>
                            </div>
                            <div class="cell-secondary" style="margin-top:4px;">
                                업로더:
                                <a th:href="@{/admin/users/{id}(id=${report.photoUploaderId})}"
                                   th:text="${report.photoUploaderNickname}"
                                   style="color:var(--text-2); text-decoration:none;"
                                   onmouseover="this.style.textDecoration='underline'"
                                   onmouseout="this.style.textDecoration='none'"></a>
                                <span th:with="cnt=${authorReportCounts.get(report.photoUploaderId)}"
                                      th:if="${cnt != null}"
                                      th:classappend="${cnt >= 5} ? 'report-count-high' : 'report-count-low'"
                                      class="report-count-badge"
                                      th:text="'누적 신고 ' + ${cnt} + '건'"></span>
                                <span style="margin-left:6px;">•</span>
                                <span style="margin-left:6px;">아티스트: <span th:text="${report.photo.artist.name}"></span></span>
                            </div>
                            <div th:if="${report.detail != null and !#strings.isEmpty(report.detail)}"
                                 class="report-detail"
                                 th:text="${report.detail}"></div>
                        </td>
                        <td>
                            <span class="reason-badge"
                                  th:classappend="'reason-' + ${report.reason}"
                                  th:text="${report.reason.displayName}">
                            </span>
                        </td>
                        <td class="cell-secondary" th:text="${report.reporter.nickname}"></td>
                        <td class="cell-secondary"
                            th:text="${#temporals.format(report.createdAt, 'MM-dd HH:mm')}"></td>
                        <td>
                            <span class="status-badge"
                                  th:classappend="'status-' + ${report.status}"
                                  th:text="${report.status.displayName}">
                            </span>
                        </td>
                        <td>
                            <div th:if="${report.pending}"
                                 style="display:flex; gap:6px;">
                                <form th:action="@{/admin/reports/photos/{id}/delete-photo(id=${report.id})}" method="post">
                                    <input type="hidden" name="page" th:value="${reports.number}"/>
                                    <button type="submit" class="btn btn-danger btn-sm"
                                            onclick="return confirm('사진을 삭제하고 신고를 처리할까요?')">
                                        사진 삭제
                                    </button>
                                </form>
                                <form th:action="@{/admin/reports/{id}/dismiss(id=${report.id})}" method="post">
                                    <input type="hidden" name="type" value="photo"/>
                                    <input type="hidden" name="page" th:value="${reports.number}"/>
                                    <button type="submit" class="btn btn-secondary btn-sm"
                                            onclick="return confirm('이 신고를 기각할까요?')">
                                        기각
                                    </button>
                                </form>
                            </div>
                            <span th:unless="${report.pending}"
                                  style="color:var(--muted); font-size:12px;">처리 완료</span>
                        </td>
                    </tr>
                    <tr class="empty-row" th:if="${reports.totalElements == 0}">
                        <td colspan="8">사진 신고 내역이 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
                </div>
            </div>

            <div th:insert="~{admin/fragments :: pagination(${reports}, '/admin/reports', 'type=' + type + '&status=' + status)}"></div>
        </div>
    </div>
</div>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script>
(function () {
    function toggleAll(master) {
        document.querySelectorAll('.row-chk').forEach(function (cb) {
            cb.checked = master.checked;
        });
        updateToolbar();
    }

    function updateToolbar() {
        var checked = document.querySelectorAll('.row-chk:checked');
        var toolbar = document.getElementById('bulk-toolbar');
        var countEl = document.getElementById('bulk-count');
        if (!toolbar) return;
        if (checked.length > 0) {
            toolbar.classList.add('visible');
            countEl.textContent = checked.length + '건 선택됨';
        } else {
            toolbar.classList.remove('visible');
        }
        var master = document.getElementById('chk-all');
        var all = document.querySelectorAll('.row-chk');
        if (master && all.length > 0) {
            master.indeterminate = checked.length > 0 && checked.length < all.length;
            master.checked = checked.length === all.length;
        }
    }

    function submitBulk(endpoint, confirmTpl) {
        var checked = document.querySelectorAll('.row-chk:checked');
        if (checked.length === 0) return;
        var msg = confirmTpl.replace('{n}', checked.length);
        if (!confirm(msg)) return;

        var form = document.getElementById('bulk-form');
        form.action = endpoint;
        form.querySelectorAll('input[name="ids"]').forEach(function (el) { el.remove(); });
        checked.forEach(function (cb) {
            var input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'ids';
            input.value = cb.value;
            form.appendChild(input);
        });
        form.submit();
    }

    window.toggleAll = toggleAll;
    window.updateToolbar = updateToolbar;
    window.submitBulk = submitBulk;
})();
</script>
</body>
</html>
