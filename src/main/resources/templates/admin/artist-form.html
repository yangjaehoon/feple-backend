<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Feple Admin — 아티스트 등록</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<div th:insert="~{admin/fragments :: navbar('artists')}"></div>
<div class="main-content">
    <div class="page-header">
        <div>
            <h1 class="page-title">아티스트 등록</h1>
            <div class="breadcrumb">
                <a th:href="@{/admin}">대시보드</a>
                <span class="bc-sep">›</span>
                <a th:href="@{/admin/artists}">아티스트</a>
                <span class="bc-sep">›</span>
                <span>등록</span>
            </div>
        </div>
    </div>
    <div class="content-area">
        <div class="card" style="max-width:560px;">
            <div class="card-header">
                <div class="card-title">🎤 새 아티스트</div>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/artists/new}"
                      th:object="${artist}"
                      method="post"
                      enctype="multipart/form-data">

                    <div class="form-grid">
                        <div class="form-group">
                            <label>이름</label>
                            <input type="text" th:field="*{name}" placeholder="아티스트 이름" required/>
                        </div>

                        <div class="form-group">
                            <label>영어 이름</label>
                            <input type="text" th:field="*{nameEn}" placeholder="English Name (선택)"/>
                        </div>

                        <div class="form-group">
                            <label>카테고리</label>
                            <select th:field="*{genre}" required>
                                <option value="">선택하세요</option>
                                <option th:each="g : ${T(com.feple.feple_backend.artist.entity.ArtistGenre).values()}"
                                        th:value="${g}"
                                        th:text="${g.displayName}"></option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>프로필 이미지 <span style="color:#E11D48;">*</span></label>
                            <div style="display:flex; gap:16px; align-items:flex-start;">
                                <div id="img-preview" style="width:72px; height:72px; border-radius:50%; overflow:hidden; border:2px solid var(--border); flex-shrink:0; background:var(--bg); display:flex; align-items:center; justify-content:center;">
                                    <img id="preview-img" style="display:none; width:100%; height:100%; object-fit:cover;" alt="미리보기"/>
                                    <span id="preview-ph" style="font-size:24px; color:var(--muted);">🎤</span>
                                </div>
                                <div>
                                    <input type="file" name="profileImageFile" id="profile-img-input"
                                           accept=".jpg,.jpeg,.png,.webp" required
                                           onchange="previewArtistImage(this)"/>
                                    <div style="font-size:11px; color:var(--muted); margin-top:6px;">jpg, jpeg, png, webp · 최대 5MB</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">등록하기</button>
                        <a th:href="@{/admin/artists}" class="btn btn-secondary">취소</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script>
function previewArtistImage(input) {
    if (!input.files || !input.files[0]) return;
    var file = input.files[0];
    if (file.size > 5 * 1024 * 1024) {
        alert('파일 크기가 5MB를 초과합니다.');
        input.value = '';
        return;
    }
    var reader = new FileReader();
    reader.onload = function(e) {
        var img = document.getElementById('preview-img');
        var ph  = document.getElementById('preview-ph');
        img.src = e.target.result;
        img.style.display = '';
        ph.style.display = 'none';
    };
    reader.readAsDataURL(file);
}
</script>
</body>
</html>
