<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Feple Admin — 아티스트 등록</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<div th:insert="~{admin/fragments :: topbar}"></div>
<div th:insert="~{admin/fragments :: sidebar('artists')}"></div>
<div class="main-content">
    <div class="page-header">
        <div>
            <h1 class="page-title">아티스트 등록</h1>
            <div class="breadcrumb">
                <a th:href="@{/admin}">대시보드</a>
                <span class="bc-sep">›</span>
                <a th:href="@{/admin/artists}">아티스트</a>
                <span class="bc-sep">›</span>
                <span>등록</span>
            </div>
        </div>
    </div>
    <div class="content-area">
        <div class="card" style="max-width:560px;">
            <div class="card-header">
                <div class="card-title">🎤 새 아티스트</div>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/artists/new}"
                      th:object="${artist}"
                      method="post"
                      enctype="multipart/form-data">

                    <div class="form-grid">
                        <div class="form-group">
                            <label>이름</label>
                            <input type="text" th:field="*{name}" placeholder="아티스트 이름" required/>
                        </div>

                        <div class="form-group">
                            <label>카테고리</label>
                            <select th:field="*{genre}" required>
                                <option value="">선택하세요</option>
                                <option th:each="g : ${T(com.feple.feple_backend.artist.entity.ArtistGenre).values()}"
                                        th:value="${g}"
                                        th:text="${g.displayName}"></option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>프로필 이미지</label>
                            <input type="file" name="profileImageFile" accept="image/*" required/>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">등록하기</button>
                        <a th:href="@{/admin/artists}" class="btn btn-secondary">취소</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
