<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 로그인 - Feple</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f0f5;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%; max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
    }
    .logo { font-size: 22px; font-weight: 800; color: #6C63FF; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #999; margin-bottom: 28px; }
    label { display: block; font-size: 13px; color: #555; font-weight: 600; margin-bottom: 6px; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid #ddd; border-radius: 8px;
      font-size: 15px; outline: none; margin-bottom: 16px;
      transition: border-color .2s;
    }
    input:focus { border-color: #6C63FF; }
    button {
      width: 100%; padding: 14px;
      background: #6C63FF; color: #fff;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 700; cursor: pointer;
    }
    button:hover { background: #574fd6; }
    .alert {
      padding: 10px 14px; border-radius: 8px;
      margin-bottom: 16px; font-size: 13px;
      background: #fff0f0; color: #d32f2f; border: 1px solid #ffcdd2;
    }
    .success {
      background: #f0fff4; color: #2e7d32; border: 1px solid #c8e6c9;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Feple Admin</div>
    <div class="subtitle">관리자 전용 페이지입니다.</div>

    <div th:if="${param.error}" class="alert">아이디 또는 비밀번호가 올바르지 않습니다.</div>
    <div th:if="${param.logout}" class="alert success">로그아웃 되었습니다.</div>

    <form th:action="@{/admin/login}" method="post">
      <label for="username">아이디</label>
      <input type="text" id="username" name="username" placeholder="관리자 아이디" required autofocus/>

      <label for="password">비밀번호</label>
      <input type="password" id="password" name="password" placeholder="비밀번호" required/>

      <button type="submit">로그인</button>
    </form>
  </div>
</body>
</html>
