<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Feple Admin — 감사 로그</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<div th:insert="~{admin/fragments :: navbar('logs')}"></div>
<div class="main-content">
    <div th:replace="~{admin/fragments :: pageHeader('감사 로그', '감사 로그')}"></div>
    <div class="content-area">

        <div class="card">
            <!-- 필터 바 -->
            <div style="padding:14px 22px; border-bottom:1px solid var(--border); display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                <form th:action="@{/admin/logs}" method="get" style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                    <select name="targetType" class="form-select" style="width:auto;">
                        <option value=""           th:selected="${#strings.isEmpty(targetType)}">전체 대상</option>
                        <option value="USER"        th:selected="${targetType == 'USER'}">회원</option>
                        <option value="FESTIVAL"    th:selected="${targetType == 'FESTIVAL'}">페스티벌</option>
                        <option value="ARTIST"      th:selected="${targetType == 'ARTIST'}">아티스트</option>
                        <option value="POST"        th:selected="${targetType == 'POST'}">게시글</option>
                        <option value="COMMENT"     th:selected="${targetType == 'COMMENT'}">댓글</option>
                        <option value="REPORT"      th:selected="${targetType == 'REPORT'}">신고</option>
                        <option value="CERTIFICATION" th:selected="${targetType == 'CERTIFICATION'}">인증</option>
                        <option value="BAD_WORD"    th:selected="${targetType == 'BAD_WORD'}">금칙어</option>
                        <option value="SONG_REQUEST" th:selected="${targetType == 'SONG_REQUEST'}">노래 요청</option>
                    </select>
                    <input type="text" name="adminUsername" th:value="${adminUsername}"
                           placeholder="관리자 이름"
                           style="padding:6px 10px; border:1px solid var(--border); border-radius:6px; font-size:13px; width:130px;"/>
                    <input type="date" name="from"
                           th:value="${from}"
                           class="form-select" style="width:auto; cursor:pointer;"
                           title="시작일"/>
                    <span style="font-size:13px; color:var(--muted);">~</span>
                    <input type="date" name="to"
                           th:value="${to}"
                           class="form-select" style="width:auto; cursor:pointer;"
                           title="종료일"/>
                    <button type="submit" class="btn btn-primary btn-sm">조회</button>
                    <a th:if="${!#strings.isEmpty(targetType) or !#strings.isEmpty(adminUsername) or from != null or to != null}"
                       th:href="@{/admin/logs}"
                       class="btn btn-secondary btn-sm">초기화</a>
                </form>
                <span style="margin-left:auto; font-size:13px; color:var(--muted);"
                      th:text="'총 ' + ${logs.totalElements} + '건'"></span>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th style="width:140px;">시각</th>
                        <th style="width:110px;">관리자</th>
                        <th style="width:200px;">액션</th>
                        <th style="width:90px;">대상</th>
                        <th style="width:70px;">ID</th>
                        <th>상세</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="entry : ${logs.content}">
                        <td style="color:var(--muted); font-size:12px; white-space:nowrap;"
                            th:text="${#temporals.format(entry.createdAt, 'MM-dd HH:mm:ss')}"></td>

                        <td style="font-size:12.5px; color:var(--text-2);"
                            th:text="${entry.adminUsername != null ? entry.adminUsername : '—'}"></td>

                        <td>
                            <span th:with="a=${entry.action}"
                                  th:class="${#strings.contains(a,'DELETE') or #strings.contains(a,'BAN') or #strings.contains(a,'REJECT')}
                                           ? 'log-badge log-danger'
                                           : (${#strings.contains(a,'CREATE') or #strings.contains(a,'ADD') or #strings.contains(a,'APPROVE') or a == 'USER_UNBAN'}
                                              ? 'log-badge log-success'
                                              : 'log-badge log-info')"
                                  th:text="${a == 'FESTIVAL_CREATE'} ? '페스티벌 등록'
                                         : (${a == 'FESTIVAL_UPDATE'} ? '페스티벌 수정'
                                         : (${a == 'FESTIVAL_DELETE'} ? '페스티벌 삭제'
                                         : (${a == 'ARTIST_CREATE'} ? '아티스트 등록'
                                         : (${a == 'ARTIST_UPDATE'} ? '아티스트 수정'
                                         : (${a == 'ARTIST_DELETE'} ? '아티스트 삭제'
                                         : (${a == 'USER_BAN'} ? '회원 정지'
                                         : (${a == 'USER_UNBAN'} ? '정지 해제'
                                         : (${a == 'USER_DELETE'} ? '회원 탈퇴'
                                         : (${a == 'REPORT_DISMISS'} ? '신고 기각'
                                         : (${a == 'REPORT_POST_DELETE'} ? '신고 글 삭제'
                                         : (${a == 'REPORT_COMMENT_DELETE'} ? '신고 댓글 삭제'
                                         : (${a == 'REPORT_PHOTO_DELETE'} ? '신고 사진 삭제'
                                         : (${a == 'REPORT_BULK_DISMISS'} ? '일괄 신고 기각'
                                         : (${a == 'REPORT_BULK_POST_DELETE'} ? '일괄 글 삭제'
                                         : (${a == 'REPORT_BULK_COMMENT_DELETE'} ? '일괄 댓글 삭제'
                                         : (${a == 'REPORT_BULK_PHOTO_DELETE'} ? '일괄 사진 삭제'
                                         : (${a == 'BAD_WORD_ADD'} ? '금칙어 추가'
                                         : (${a == 'BAD_WORD_DELETE'} ? '금칙어 삭제'
                                         : (${a == 'ARTIST_SUGGESTION_DISMISS'} ? '아티스트 신청 처리'
                                         : (${a == 'SONG_REQUEST_APPROVE'} ? '노래 요청 승인'
                                         : (${a == 'SONG_REQUEST_REJECT'} ? '노래 요청 거절'
                                         : (${a == 'CERTIFICATION_APPROVE'} ? '인증 승인'
                                         : (${a == 'CERTIFICATION_REJECT'} ? '인증 거절'
                                         : ${#strings.replace(a, '_', ' ')})))))))))))))))))))))))">
                            </span>
                        </td>

                        <td style="font-size:12.5px; color:var(--muted);"
                            th:text="${entry.targetType != null ? entry.targetType : '—'}"></td>

                        <td style="font-size:12.5px;">
                            <th:block th:if="${entry.targetId != null}">
                                <a th:if="${entry.targetType == 'USER'}"
                                   th:href="@{/admin/users/{id}(id=${entry.targetId})}"
                                   th:text="${entry.targetId}"
                                   style="color:var(--primary);"></a>
                                <a th:if="${entry.targetType == 'FESTIVAL'}"
                                   th:href="@{/admin/festivals/{id}(id=${entry.targetId})}"
                                   th:text="${entry.targetId}"
                                   style="color:var(--primary);"></a>
                                <a th:if="${entry.targetType == 'POST'}"
                                   th:href="@{/admin/posts/{id}(id=${entry.targetId})}"
                                   th:text="${entry.targetId}"
                                   style="color:var(--primary);"></a>
                                <span th:if="${entry.targetType != 'USER' and entry.targetType != 'FESTIVAL' and entry.targetType != 'POST'}"
                                      th:text="${entry.targetId}"
                                      style="color:var(--muted);"></span>
                            </th:block>
                            <span th:if="${entry.targetId == null}" style="color:var(--muted);">—</span>
                        </td>

                        <td style="font-size:13px; color:var(--text);"
                            th:text="${entry.detail != null ? entry.detail : '—'}"></td>
                    </tr>
                    <tr class="empty-row" th:if="${logs.totalElements == 0}">
                        <td colspan="6">기록된 로그가 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div th:insert="~{admin/fragments :: pagination(${logs}, '/admin/logs', ${extraParams})}"></div>
        </div>
    </div>
</div>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
