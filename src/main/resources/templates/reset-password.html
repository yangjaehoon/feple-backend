<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 재설정 - Feple</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f0f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
    }
    .logo {
      font-size: 22px;
      font-weight: 800;
      color: #6C63FF;
      margin-bottom: 8px;
    }
    h1 { font-size: 20px; color: #222; margin-bottom: 24px; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 600; }
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 16px;
    }
    input[type="password"]:focus { border-color: #6C63FF; }
    .hint { font-size: 12px; color: #999; margin-top: -12px; margin-bottom: 16px; }
    button {
      width: 100%;
      padding: 14px;
      background: #6C63FF;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
    }
    button:hover { background: #574fd6; }
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .alert.error { background: #fff0f0; color: #d32f2f; border: 1px solid #ffcdd2; }
    .alert.success { background: #f0fff4; color: #2e7d32; border: 1px solid #c8e6c9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Feple</div>

    <!-- 토큰 만료 / 에러 -->
    <div th:if="${error != null and token == null}" class="alert error" th:text="${error}"></div>

    <!-- 성공 -->
    <div th:if="${success}" class="alert success">
      비밀번호가 성공적으로 변경되었습니다.<br>앱으로 돌아가 새 비밀번호로 로그인해주세요.
    </div>

    <!-- 재설정 폼 -->
    <div th:if="${token != null and success == null}">
      <h1>비밀번호 재설정</h1>
      <div th:if="${error}" class="alert error" th:text="${error}"></div>

      <form th:action="@{/reset-password}" method="post">
        <input type="hidden" name="token" th:value="${token}"/>

        <label for="newPassword">새 비밀번호</label>
        <input type="password" id="newPassword" name="newPassword"
               placeholder="새 비밀번호 입력" required/>
        <p class="hint">영문자 + 숫자 포함, 8자 이상</p>

        <label for="confirmPassword">비밀번호 확인</label>
        <input type="password" id="confirmPassword" name="confirmPassword"
               placeholder="비밀번호 재입력" required/>

        <button type="submit">비밀번호 변경</button>
      </form>
    </div>
  </div>
</body>
</html>
