spring:
  datasource:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      keepalive-time: 120000     # 2분마다 유휴 커넥션 ping — MySQL wait_timeout(8h) 대비 충분
      max-lifetime: 600000       # 10분 후 커넥션 재생성 (MySQL wait_timeout보다 짧게)
      idle-timeout: 300000       # 5분 이상 유휴 커넥션 제거
      connection-timeout: 5000   # DB 단절 시 빠른 실패 — 30초 대기 스레드 누적 방지

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none   # Flyway가 스키마 관리, JPA는 DDL 수행 안 함
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        default_batch_fetch_size: 100   # 미처 발견 못한 N+1 지점의 지연 로딩을 IN절 배치로 완화
        session:
          events:
            log:
              LOG_QUERIES_SLOWER_THAN_MS: 200   # 200ms 초과 쿼리 WARN 로깅 — 슬로우 쿼리 가시성 확보

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true   # flyway_schema_history 없는 기존 DB에서 V1을 기준점으로 마킹
    baseline-version: 1
    out-of-order: false
    validate-on-migrate: true

  sql:
    init:
      mode: never   # Flyway가 스키마·데이터 초기화 담당 — Spring SQL init 불필요

  jackson:
    serialization:
      write-dates-as-timestamps: false

  config:
    import: "optional:classpath:application-local.yaml"
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB

server:
  port: 8080
  forward-headers-strategy: native
  servlet:
    session:
      timeout: 2h
      cookie:
        http-only: true
        secure: true
        same-site: strict
    encoding:
      charset: UTF-8
      enabled: true
      force: true

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: 7200000       # 2시간
  refresh-token-expiration-ms: 2592000000  # 30일

app:
  s3:
    prefix: artist-photos
    presign-minutes: 10
  cdn:
    base-url: ${CDN_BASE_URL:}
  google:
    maps:
      key: ${GOOGLE_MAPS_KEY:}
  kakao:
    maps:
      key: ${KAKAO_MAPS_KEY:}
  youtube:
    api-key: ${YOUTUBE_API_KEY:}
  gemini:
    api-key: ${GEMINI_API_KEY:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8080}
  firebase:
    credentials: ${FIREBASE_CREDENTIALS:}
  admin:
    username: ${ADMIN_USERNAME}
    password: ${ADMIN_PASSWORD}

management:
  endpoints:
    web:
      exposure:
        # health는 permitAll(로드밸런서 헬스체크), prometheus/metrics는 SecurityConfig의
        # anyRequest().authenticated()에 걸려 인증 없이는 접근 불가 — 별도 스크레이핑
        # 계정/네트워크 접근 제어(보안 그룹 등)는 실제 Prometheus 연동 시점에 결정 필요
        include: health, prometheus, metrics
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: feple-backend

file:
  upload-dir: uploads/posters

kma:
  service-key: ${KMA_SERVICE_KEY:}
  base-url: http://apis.data.go.kr/1360000/VilageFcstInfoService_2.0

springdoc:
  swagger-ui:
    enabled: false
    path: /swagger-ui
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    enabled: false
    path: /v3/api-docs

logging:
  structured:
    format:
      console: logstash   # JSON 구조화 로그 — Grafana Loki / ELK 연동용
  level:
    root: INFO
    com.feple: INFO
    org.springframework.security: WARN
    org.hibernate: WARN
    com.zaxxer.hikari: WARN
    org.flywaydb: WARN