spring:
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      keepalive-time: 30000      # 30초마다 유휴 커넥션에 ping — MySQL이 끊기 전에 감지
      max-lifetime: 600000       # 10분 후 커넥션 재생성 (MySQL wait_timeout보다 짧게)
      idle-timeout: 300000       # 5분 이상 유휴 커넥션 제거
      connection-timeout: 30000  # 커넥션 획득 대기 최대 30초

  jpa:
    hibernate:
      #ddl-auto: create
      ddl-auto: update
    defer-datasource-initialization: true

    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false


  sql:
    init:
      #mode: always #h2 설정
      mode: always

  config:
    import: "optional:classpath:application-local.yaml"
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB

server:
  port: 8080
  forward-headers-strategy: native
  servlet:
    session:
      timeout: 2h
    encoding:
      charset: UTF-8
      enabled: true
      force: true

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: 7200000       # 2시간
  refresh-token-expiration-ms: 2592000000  # 30일

app:
  s3:
    prefix: artist-photos
    presign-minutes: 10
  google:
    maps:
      key: ${GOOGLE_MAPS_KEY:}
  kakao:
    maps:
      key: ${KAKAO_MAPS_KEY:}
  youtube:
    api-key: ${YOUTUBE_API_KEY:}
  gemini:
    api-key: ${GEMINI_API_KEY:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8080}
  firebase:
    credentials: ${FIREBASE_CREDENTIALS:}
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

file:
  upload-dir: uploads/posters

kma:
  service-key: ${KMA_SERVICE_KEY:}
  base-url: http://apis.data.go.kr/1360000/VilageFcstInfoService_2.0

springdoc:
  swagger-ui:
    enabled: false
    path: /swagger-ui
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    enabled: false
    path: /v3/api-docs