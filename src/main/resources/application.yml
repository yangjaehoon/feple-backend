spring:
  jpa:
    hibernate:
      #ddl-auto: create
      ddl-auto: update
    defer-datasource-initialization: true

    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false


  sql:
    init:
      #mode: always #h2 설정
      mode: always

  config:
    import: "optional:classpath:application-local.yaml"

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: 1800000      # 30분
  refresh-token-expiration-ms: 604800000   # 7일

app:
  s3:
    prefix: artist-photos
    presign-minutes: 10
  google:
    maps:
      key: ${GOOGLE_MAPS_KEY:}

file:
  upload-dir: uploads/posters